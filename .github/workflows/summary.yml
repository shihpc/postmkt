name: build summary analysis

on:
  schedule:
    # 2026-07-22 起主觸發＝taiwan-flow-live-v2 Worker 事件驅動 dispatch（上游全齊即發、
    # 帶 inputs.slot；am 常態 ~07:1x、pm 常態 ~22:0x）。本 cron 降級為兜底備援：
    # 時間「不挪」——Decide slot 依 cron 字串精確比對判場次，挪動必須同步改 case；
    # 正常日備援 run 被 build_summary.py「已產出守門」秒退（零 LLM 花費），挪動零收益。
    # am 場：台北 06:23（UTC 前一日 22:23，週日~四）；pm 場：台北 22:47（UTC 14:47）
    - cron: "23 22 * * 0-4"
    - cron: "47 14 * * 1-5"
  workflow_dispatch:
    inputs:
      slot:
        description: "場次（留空依 UTC 時間自動判斷：<12 時 am，否則 pm）"
        type: choice
        options: ["", "am", "pm"]
        default: ""

permissions:
  contents: write

concurrency:
  group: build-summary
  cancel-in-progress: false

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 240  # 涵蓋最長輪詢（pm 硬等 170 分；am 硬等 150＋軟等 60 分）＋API 呼叫時間
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Decide slot
        id: slot
        run: |
          SLOT="${{ github.event.inputs.slot }}"
          # 排程觸發依「觸發的 cron 表達式」判斷場次（am cron 在 UTC 22 時，
          # 不能再用「UTC 時 <12 → am」判斷）；手動觸發無 schedule 值時退回時刻判斷
          # （台北 12:00 前 = UTC 4 前視為 am）。
          if [ -z "$SLOT" ]; then
            case "${{ github.event.schedule }}" in
              "23 22 * * 0-4") SLOT=am ;;
              "47 14 * * 1-5") SLOT=pm ;;
              *) if [ "$(date -u +%H)" -lt 4 ]; then SLOT=am; else SLOT=pm; fi ;;
            esac
          fi
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "slot=$SLOT"

      - name: Build summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python build_summary.py --slot ${{ steps.slot.outputs.slot }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 目錄可能不存在（skip 場次、或尚無任何產出）→ 容錯；-A 才會把
          # 清理段刪除的 data/analyses/ 過期檔一併 stage 成刪除
          git add -A data/summary 2>/dev/null || true
          git add -A data/analyses 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "data: summary ${{ steps.slot.outputs.slot }} $(date -u +%Y-%m-%dT%H:%MZ)"
          pushed=0
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then pushed=1; break; fi
            sleep 4
          done
          if [ "$pushed" != "1" ]; then echo "::error::push failed after 5 retries"; exit 1; fi
