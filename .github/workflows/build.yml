name: build postmkt data

on:
  schedule:
    # 平日 21:30 台北（13:30 UTC）
    - cron: "30 13 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-postmkt
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build postmkt.json
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python build_postmkt.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/postmkt.json
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "data: postmkt $(date -u +%Y-%m-%dT%H:%MZ)"
          pushed=0
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then pushed=1; break; fi
            sleep 4
          done
          if [ "$pushed" != "1" ]; then echo "::error::push failed after 5 retries"; exit 1; fi
