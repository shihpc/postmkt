name: build diag data

on:
  schedule:
    # 平日 22:10 台北（14:10 UTC）：排在 build.yml 21:53 之後，
    # 讓 data/postmkt.json（券資比/當沖量 merge 來源）先落地
    - cron: "40 14 * * 1-5"   # 22:40 台北（備援；主觸發＝v2 Worker 晚場協調班鏈式 dispatch：postmkt.json 今日已備即發，2026-07-22）
  workflow_dispatch:   # 手動觸發
  push:
    branches: [main]   # 只限 main：feature 分支觸發會在 push 階段失敗且無意義（run #2 教訓）
    paths:
      - src/build_diag.py
      - .github/workflows/diag.yml

permissions:
  contents: write

concurrency:
  group: build-diag
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build diag.json
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python src/build_diag.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/diag
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "data: diag $(date -u +%Y-%m-%dT%H:%MZ)"
          pushed=0
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then pushed=1; break; fi
            sleep 4
          done
          if [ "$pushed" != "1" ]; then echo "::error::push failed after 5 retries"; exit 1; fi
