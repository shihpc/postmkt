<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盤後分析 · 股市雷達</title>
<style>
  :root{
    --bg:#0b1120; --bg2:#111a2e; --card:#16213a; --card-hover:#1d2b4a;
    --line:#243556; --txt:#e6edf7; --muted:#8aa0c0; --accent:#4f9cff;
    --chip:#1b2a49;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Segoe UI","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,var(--bg2),var(--bg));
    color:var(--txt); min-height:100vh; padding:24px 16px 64px;
  }
  .wrap{max-width:880px;margin:0 auto}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .top a.back{color:var(--muted);text-decoration:none;font-size:.9rem;border:1px solid var(--line);
    border-radius:9px;padding:4px 10px;transition:.15s}
  .top a.back:hover{color:var(--accent);border-color:var(--accent)}
  header h1{font-size:1.5rem;font-weight:700;letter-spacing:.5px}
  .sub{color:var(--muted);font-size:.85rem;margin-top:6px;line-height:1.6}
  .tabs{display:flex;gap:6px;margin:14px 0 10px;flex-wrap:wrap}
  .tab{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:7px 13px;
    font-size:.86rem;color:var(--muted);cursor:pointer;user-select:none;transition:.15s;white-space:nowrap}
  .tab:hover{border-color:#33507e}
  .tab.active{color:var(--txt);border-color:var(--accent);background:var(--card-hover);font-weight:650}
  .stats{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 10px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:11px;
    padding:6px 11px;font-size:.76rem;color:var(--muted)}
  .stat b{color:var(--txt);font-weight:700;margin-right:4px}
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 16px;
    margin:10px 0;font-size:.9rem;line-height:1.7}
  .mcard b{color:var(--txt)}
  .kvgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:4px 16px;font-size:.82rem}
  .kv{display:flex;justify-content:space-between;gap:8px;padding:3px 0;border-bottom:1px solid rgba(36,53,86,.4)}
  .kv .mut{white-space:nowrap}
  /* 明細面板依資料性質分組（借券餘額/放空部位/融資/當沖/三大法人），跨滿整列寬度 */
  .kvsec{grid-column:1/-1;color:var(--accent);font-weight:700;font-size:.76rem;
    margin:10px 0 0;padding-top:8px;border-top:1px solid var(--line)}
  .kvsec:first-child{margin-top:2px;padding-top:0;border-top:none}
  .msection{margin:18px 2px 6px;font-size:.98rem;font-weight:700}
  .msection::before{content:"▸";color:var(--accent);margin-right:6px;font-size:.85rem}
  .msection .n{color:var(--muted);font-weight:400;font-size:.74rem;margin-left:8px}
  /* 表格區塊：固定高度約10列＋自己的垂直捲軸(表頭sticky需要在這個容器內才生效)。
     水平也可捲動看其餘欄位。 */
  .tblbox{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:6px 12px 10px;margin:8px 0;overflow:auto;max-height:495px}
  /* border-collapse:collapse 會讓 position:sticky 的儲存格在多數瀏覽器算圖時
     跟相鄰儲存格的邊框/內容顯示錯位(sticky格「浮起」後collapse的邊框模型撐不住)，
     這是sticky欄位左側會看到別欄資料透出來的根因。改用separate+0間距。
     border-bottom 改用 box-shadow(inset)畫格線：一般border在sticky格與相鄰格
     疊圖時，各瀏覽器對「格線該歸哪一格」算法不一致，容易在接縫處算出1px縫隙
     讓底下內容透出；box-shadow畫在自己的盒子內側，不受相鄰格影響，不會有縫。
     will-change:transform 讓sticky格獨立成合成層：手機慣性捲動(momentum scroll)
     時，若sticky格跟一般格在同一層合成，捲動最後一刻常有一楨no同步，讓後面
     的欄位在sticky格左/上緣「閃」一下穿幫，這是Safari/行動瀏覽器常見sticky
     渲染bug，強制GPU合成層可以避免。 */
  .mtable{width:100%;border-collapse:separate;border-spacing:0;font-size:.84rem}
  .mtable th,.mtable td{padding:6px 7px;text-align:right;box-shadow:inset 0 -1px 0 rgba(36,53,86,.5);
    white-space:nowrap;vertical-align:middle;background:var(--card)}
  .mtable tr:last-child td{box-shadow:none}
  .mtable th:first-child,.mtable td:first-child{text-align:left}
  /* 真正的穿幫根因找到了：.tblbox有padding(top6px/left12px)，但overflow的裁切邊界
     是padding box(含padding)，而position:sticky的top:0/left:0是貼齊content
     edge(padding之內)算，兩者之間就差padding那幾px——捲動時，被捲過去的內容
     還沒被裁切掉之前，會在這條padding縫隙裡短暫露出，就是先前多次修border-
     collapse/box-shadow/will-change都修不掉的「穿幫」。真正的解法：sticky的
     top/left直接設成-padding值，讓貼齊的邊界跟裁切邊界重合，縫隙歸零。 */
  .mtable th{color:var(--muted);font-weight:600;font-size:.74rem;cursor:pointer;user-select:none;
    position:sticky;top:-6px;z-index:2;will-change:transform}
  .mtable th:hover{color:var(--txt)}
  /* 固定第一欄（股票名稱）：只套用在一般排行榜表格，鉅額交易的rowspan合併表格
     第一格不是每列都存在，套用會讓固定欄位跟其他欄位錯位，故排除（該表格另有
     bstick1/2 專屬class，見blockTradeTable()）。分組表頭(mtable-2row)每欄兩列
     都有獨立th(見tblInner())，所以這條規則對兩列表頭一樣成立，不用特別排除。 */
  .mtable-stickycol td:first-child, .mtable-stickycol th:first-child{position:sticky;left:-12px;z-index:1;will-change:transform}
  .mtable-stickycol th:first-child{z-index:3}
  /* 分組表頭：第一列是分組名稱(跨欄)或空白佔位，第二列是個別欄名+排序箭頭。
     第二列的sticky top由fixGroupHeaderSticky()量測第一列實際高度後動態寫入
     (同樣要扣掉6px padding補償)；這裡只給預設值防止JS還沒跑之前(極短暫)不sticky。*/
  .mtable-2row th.grp{text-align:center;color:var(--accent);font-size:.72rem}
  /* 分組交界格線：跟隔壁分組拉出一條直向分隔線，避免相鄰分組的欄位混淆
     （例如「借賣」最後一欄跟「融券」第一欄看起來像同一組）。 */
  .gb{border-left:1px solid var(--line)}
  /* 兩列式表頭光靠每個th自己position:sticky不夠：實測此瀏覽器環境下thead裡有
     兩個<tr>時，光th sticky會整批跟著內容捲走、完全不會黏住，連tr本身也要
     position:sticky才正常。第二列top要等於第一列實際高度(扣padding補償)，由
     fixGroupHeaderSticky()動態量測寫入；這裡的18px只是JS還沒跑之前的預設值。 */
  /* mtable-tot(加總列在表頭下方)結構跟2row一樣是thead兩列，共用同一套tr sticky規則 */
  .mtable-2row thead tr,.mtable-tot thead tr{position:sticky;z-index:4}
  .mtable-2row thead tr:first-child,.mtable-tot thead tr:first-child{top:-6px}
  .mtable-2row thead tr:nth-child(2),.mtable-tot thead tr:nth-child(2){top:18px}
  /* 加總列：視覺上跟表頭區分（亮色粗體、上下緣分隔線），不參與點擊排序 */
  .mtable-tot tr.tot th{color:var(--txt);font-weight:700;cursor:default;
    box-shadow:inset 0 1px 0 var(--line), inset 0 -1px 0 var(--line)}
  /* 凍結前兩欄（分點查詢表：代號+名稱）。固定欄寬才能算第二欄left位移；
     left含-12px的.tblbox padding補償（穿幫根因見上方註解）。前兩欄的表頭格
     要同時sticky上+左，z-index須高於一般表頭列(4)。 */
  .mtable-s2 th:nth-child(-n+2),.mtable-s2 td:nth-child(-n+2){
    position:sticky;will-change:transform;z-index:2;overflow:hidden}
  .mtable-s2 th:nth-child(1),.mtable-s2 td:nth-child(1){left:-12px;width:62px;min-width:62px;max-width:62px}
  .mtable-s2 th:nth-child(2),.mtable-s2 td:nth-child(2){left:50px;width:92px;min-width:92px;max-width:92px;white-space:normal}
  .mtable-s2 thead th:nth-child(-n+2){z-index:5}
  /* 子標籤列（零股盤中/盤後、分點單點/個股/清單）與查詢輸入列 */
  .subtabs{display:flex;gap:6px;margin:10px 0 4px;flex-wrap:wrap}
  .subtab{background:var(--chip);border:1px solid var(--line);border-radius:9px;padding:5px 12px;
    font-size:.82rem;color:var(--muted);cursor:pointer;user-select:none;transition:.15s}
  .subtab:hover{border-color:#33507e}
  .subtab.active{color:var(--txt);border-color:var(--accent);font-weight:650}
  .qrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .qrow input{flex:1;min-width:140px;background:var(--bg);border:1px solid var(--line);color:var(--txt);
    border-radius:9px;padding:8px 12px;font-size:.88rem;outline:none}
  .qbtn{background:var(--card-hover);border:1px solid var(--accent);color:var(--txt);border-radius:9px;
    padding:7px 16px;font-size:.86rem;cursor:pointer;user-select:none;white-space:nowrap}
  .qbtn:hover{background:#24365c}
  /* 鉅額交易表格：前兩欄(個股/張數金額合併)固定，其餘欄位可左右捲動。手機寬度有限，
     把總張數+總金額合併成一欄兩行顯示並收窄欄寬，讓固定區佔比小一點、右側可捲動
     欄位能多露出來。固定寬度才能算出正確的累加left位移，用JS動態量測較脆弱，
     這裡改用CSS固定寬度換取可預期的sticky位移。靠左對齊+允許換行，避免內容在
     窄欄裡溢出到旁邊欄位(那樣視覺上就跟穿幫一樣了)。 */
  .mtable th.bstick1,.mtable td.bstick1,.mtable th.bstick2,.mtable td.bstick2{
    position:sticky;z-index:1;will-change:transform;text-align:left;
    white-space:normal;overflow:hidden;padding:5px 6px}
  .bstick1{left:-12px;width:64px;min-width:64px;max-width:64px}
  .bstick2{left:52px;width:72px;min-width:72px;max-width:72px}
  thead .bstick1,thead .bstick2{z-index:3}
  .mtable .nm{display:block;color:var(--muted);font-size:.72rem;line-height:1.3}
  .code{font-family:"Space Mono",Consolas,monospace;font-weight:700;color:var(--accent)}
  .up{color:#ef5b5b}.down{color:#2fbf71}.mut{color:var(--muted)}
  .clk{cursor:pointer}
  .clk:hover .code{text-decoration:underline}
  .clk.sel .code{color:#f0b45a}
  .grid2{display:flex;gap:10px;flex-wrap:wrap}
  .grid2>div{flex:1;min-width:260px}
  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:.92rem}
  footer{margin-top:32px;color:var(--muted);font-size:.78rem;text-align:center;line-height:1.7}
  footer a{color:var(--accent);text-decoration:none}
  /* 摘要分析 */
  .insight-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:10px 0;line-height:1.75;font-size:.92rem}
  .slink{color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent)}
  .insight-md h2{font-size:1.02rem;color:var(--accent);margin:16px 0 6px;font-weight:700}
  .insight-md h2:first-child{margin-top:0}
  .insight-md h3{font-size:.94rem;color:var(--txt);margin:12px 0 4px;font-weight:650}
  .insight-md ul{margin:4px 0 8px;padding-left:20px}
  .insight-md li{margin:3px 0}
  .insight-md p{margin:6px 0}
  .insight-md strong{color:var(--txt)}
  .insight-md code{background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-family:Consolas,monospace;font-size:.86rem;color:var(--accent)}
  .insight-md table{border-collapse:collapse;width:100%;margin:8px 0;font-size:.84rem}
  .insight-md th,.insight-md td{border:1px solid var(--line);padding:5px 8px;text-align:left}
  .insight-md th{background:var(--chip);color:var(--muted)}
  .insight-note{color:var(--muted);font-size:.74rem;margin:8px 4px;line-height:1.6}
  .insight-meta{color:var(--muted);font-size:.76rem;margin:2px 4px 10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><a class="back" href="https://shihpc.github.io/">← 回 Hub</a></div>
  <header>
    <h1>📊 盤後分析</h1>
    <div class="sub" id="pageSub"></div>
  </header>

  <div class="tabs" id="tabs"></div>
  <div class="stats" id="stats"></div>
  <div id="main"><div class="empty">載入中…</div></div>

  <footer>
    資料來源：FinMind（融資／借券／融券借券／當沖／鉅額）·
    <a href="https://github.com/shihpc/taiwan-flow-live-v2">taiwan-flow-live-v2</a>（主動ETF）｜
    <a href="https://github.com/shihpc/postmkt">postmkt</a>
  </footer>
</div>

<script>
"use strict";
const TABS = [
  ["insight","摘要分析"],
  ["summary","彙總分析"],
  ["aetf","主動ETF"],["lending","融借券"],["daytrade","當沖"],["block","鉅額"],
  ["oddlot","零股"],["broker","分點"],
];
const SUBS = {
  insight:"AI 摘要分析：彙整本頁各 tab 資料（主動ETF／三大法人買賣超／融借券／當沖／鉅額／零股盤中／指定分點），由 Claude 生成以查找 alpha 標的為目標的洞見。前端即時呼叫，token 由你自備、只存本機瀏覽器。非投資建議、非預測，僅描述歷史統計傾向。",
  summary:"AI 彙總分析：一鍵 6+1 次 Claude 呼叫——3 個頁面（盤後分析／即時類股動態／新聞晨報）× Sonnet 5 各 2 次獨立分析共 6 份摘要，再由 Opus 4.8 融會貫通彙總出跨份共振的精華 alpha。費用約每次 NT$8-10（摘要用 Sonnet 5、彙總用 Opus），token 由你自備、只存本機瀏覽器。另可閱讀 GitHub Actions 早晚場自動產出。非投資建議。",
  aetf:"主動式ETF每日投組快照＋主動加減碼（資料源：taiwan-flow-live-v2，投信 16:30 揭露）。",
  lending:"借券系統(SLB)＋證商營業處所(NLB)兩平台餘額、Short Interest、融資融券、當沖、三大法人買賣超整合排行，依兩平台借券餘額排序。點個股展開完整明細。單位：張／千元／億元。",
  daytrade:"當沖成交金額排行。分點推估為估算法，非逐筆交易證據。",
  block:"當日鉅額交易逐筆列表，同股票分組並附總張數/總金額；買方/賣方券商分點為盡力比對（同股同價當日多筆時可能無法唯一判定，顯示—）。類型僅「配對交易／逐筆交易」兩種，FinMind未提供單一/組合證券的區分欄位。",
  oddlot:"零股交易行情（TWSE公開端點）：盤中零股／盤後零股，依個股呈現成交股數、筆數、金額。單位：股／元。",
  broker:"券商分點進出（FinMind TradingDailyReport，每交易日約21:00更新）。單點＝查一個分點當日全部進出個股；個股＝查一檔股票當日全部進出分點；清單＝全部分點代號對照。",
};
const V2_BASE = "https://raw.githubusercontent.com/shihpc/taiwan-flow-live-v2/main/data/aetf";
// 盤後法人動態站（taiwan-flows）的資料：三大法人買賣超排行＋外資台指期未平倉，平日21:00更新
const TF_BASE = "https://raw.githubusercontent.com/shihpc/taiwan-flows/main/data";
// 摘要分析要分析的固定分點（使用者指定）：9268凱基台北、9800元大、9600富邦、9A00永豐金
const INSIGHT_BROKERS = ["9268","9800","9600","9A00"];
const INSIGHT_MODELS = [["claude-opus-4-8","Opus 4.8（最佳判讀，約NT$3/次）"],["claude-sonnet-5","Sonnet 5（近Opus、約半價更快）"]];
const state = { tab:"insight", openEtf:null, openSub:null, openLend:null, lendQuery:"",
  oddSub:"intraday", bkSub:"branch", bkListQuery:"", aetf:null, pm:null, pmErr:null, tf:null,
  insight:null, insightLoading:false, insightErr:null, insightAbort:null,
  insightModel: localStorage.getItem("insight_model") || "claude-opus-4-8",
  summary:null, summaryLoading:false, summaryErr:null, summaryProg:"", summaryAbort:null,
  sumAutoIdx:undefined, sumAutoOpen:null, sumManualOpen:null, cloudOpen:null };

const esc = s => String(s==null?"":s).replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const sgn = (v,t) => `<span class="${v>0?"up":v<0?"down":"mut"}">${t}</span>`;
const num = v => v==null ? "—" : Math.round(v).toLocaleString("en-US");
const zh = v => v==null ? '<span class="mut">—</span>' : sgn(v,(v>0?"+":"")+Math.round(v).toLocaleString("en-US")+"張");
const yi = v => v==null ? '<span class="mut">—</span>' : sgn(v,(v>0?"+":"")+(v/1e8).toFixed(2)+"億");
const yiAbs = v => v==null ? "—" : (v/1e8).toFixed(2)+"億";
const nameCell = r => `<span class="code">${esc(r.c)}</span><span class="nm">${esc(r.n||"")}</span>`;
const cleanSub = s => String(s||"").replace(/^.*?·/,"");

// 通用表格：cols=[{h,f,cls?}]，包在可橫向捲動的卡片裡；每欄可點表頭排序
const TBLS = {}; let TBLID = 0;
const tblCellText = h => { const d = document.createElement("div"); d.innerHTML = h; return d.textContent.trim(); };
const tblCellVal = t => {
  if (t === "" || t === "—") return null;
  const n = parseFloat(t.replace(/,/g,"").replace(/[^0-9.\-]/g,""));
  return isNaN(n) ? t : n;
};
// 虛擬捲動：標的數超過門檻的表格(目前只有整合排行，2000+檔)不會把全部rows
// 都變成DOM——2215列×26欄≈5.7萬個<td>，光是innerHTML/layout/sticky計算就會讓
// 切換分頁明顯延遲。改成只渲染「目前捲動視窗+緩衝」範圍的列，上下各補一個
// 高度撐開的空白spacer列維持捲軸總高度跟一般全渲染視覺上一致，資料本身仍是
// 完整全部標的(排序/搜尋都吃完整o.rows，只有『同時掛在DOM上的列數』變少)。
const VIRTUAL_THRESHOLD = 200;
const VIRTUAL_BUFFER = 15;
// opts（可選）：totals=各欄加總列的cell HTML陣列（顯示在表頭下方、跟表頭一起
// sticky、不參與排序）；s2=true時凍結前兩欄（代號+名稱，配合.mtable-s2固定欄寬）。
function tbl(cols, rows, opts){
  if (!rows || !rows.length) return `<div class="empty">無資料</div>`;
  const id = "tb" + (++TBLID);
  TBLS[id] = { cols, rows: [...rows], sort: { i: null, d: 1 },
    virtual: rows.length > VIRTUAL_THRESHOLD, rowH: 45, winStart: 0,
    totals: (opts && opts.totals) || null, s2: !!(opts && opts.s2) };
  return `<div class="tblbox" data-tbl="${id}">${tblInner(id)}</div>`;
}
// cols可選帶g(分組名)：有g的欄位在表頭分兩列呈現（第一列分組跨欄、第二列個別
// 欄名+排序）。沒有g的欄位第一列留空白佔位、第二列放實際欄名+排序——刻意不用
// rowspan貫穿兩列：實測rowspan儲存格配position:sticky在部分瀏覽器捲動時會跑位
// (sticky高度算圖跟rowspan的跨列邏輯衝突)，每欄兩列都給獨立th，sticky行為
// 才跟原本單列表頭完全一致，只是第一列(分組列)裡沒有分組的欄位長空的。
const tblBoundary = (cols, i) => cols.some(c=>c.g) && i > 0 && cols[i].g !== cols[i-1].g;
const tblCellCls = (cols, c, i) => (c.cls||"") + (tblBoundary(cols,i) ? " gb" : "");
const tblRowHtml = (cols, r) => `<tr>`+cols.map((c,i)=>`<td class="${tblCellCls(cols,c,i)}">${c.f(r)}</td>`).join("")+`</tr>`;
function tblBodyHtml(id){
  const o = TBLS[id];
  if (!o.virtual) return o.rows.map(r=>tblRowHtml(o.cols,r)).join("");
  const wrap = document.querySelector(`[data-tbl="${id}"]`);
  const viewH = wrap ? wrap.clientHeight : 495;
  const scrollTop = wrap ? wrap.scrollTop : 0;
  const start = Math.max(0, Math.floor(scrollTop / o.rowH) - VIRTUAL_BUFFER);
  const count = Math.ceil(viewH / o.rowH) + VIRTUAL_BUFFER * 2;
  const end = Math.min(o.rows.length, start + count);
  o.winStart = start;
  const spacer = h => `<tr class="vsp"><td colspan="${o.cols.length}" style="height:${h}px;padding:0;border:0;box-shadow:none"></td></tr>`;
  let html = spacer(start * o.rowH);
  for (let i = start; i < end; i++) html += tblRowHtml(o.cols, o.rows[i]);
  html += spacer((o.rows.length - end) * o.rowH);
  return html;
}
function tblInner(id){
  const { cols, rows, sort, totals, s2 } = TBLS[id];
  const hasGroups = cols.some(c => c.g);
  // 分組交界(含「有分組→無分組」「無分組→有分組」「不同分組相鄰」)畫一條直向格線，
  // 避免相鄰分組的欄位混在一起分不清楚。i===0不算交界(表格最左緣不用畫線)。
  const clsOf = (c,i) => tblCellCls(cols,c,i);
  let head;
  if (!hasGroups){
    head = `<tr>` + cols.map((c,i) => `<th class="${clsOf(c,i)}" data-i="${i}">${c.h}${sort.i===i?(sort.d>0?" ▲":" ▼"):""}</th>`).join("") + `</tr>`;
  } else {
    let row1 = "", row2 = "";
    for (let i = 0; i < cols.length; i++){
      const c = cols[i];
      if (!c.g){
        row1 += `<th class="${clsOf(c,i)}"></th>`;
      } else if (i === 0 || cols[i-1].g !== c.g){
        let j = i; while (j < cols.length && cols[j].g === c.g) j++;
        row1 += `<th class="grp${tblBoundary(cols,i)?" gb":""}" colspan="${j-i}">${c.g}</th>`;
      }
      row2 += `<th class="${clsOf(c,i)}" data-i="${i}">${c.h}${sort.i===i?(sort.d>0?" ▲":" ▼"):""}</th>`;
    }
    head = `<tr>${row1}</tr><tr>${row2}</tr>`;
  }
  // 加總列放thead（跟表頭一起sticky、排序重繪body時不動）。用th但不給data-i
  // ——sort的click handler認data-i，所以加總列點了不會觸發排序。
  if (totals){
    head += `<tr class="tot">` + totals.map((h,i)=>`<th class="${clsOf(cols[i],i)}">${h}</th>`).join("") + `</tr>`;
  }
  const twoRows = hasGroups || !!totals;
  const body = tblBodyHtml(id);
  const table = `<table class="mtable mtable-stickycol${hasGroups?" mtable-2row":""}${totals?" mtable-tot":""}${s2?" mtable-s2":""}"><thead>${head}</thead><tbody>${body}</tbody></table>`;
  // 用setTimeout而非requestAnimationFrame觸發量測：rAF在部分無頭/背景分頁環境
  // 完全不會執行，這兩個量測都需要保證真的跑到，setTimeout(fn,0)沒有這個問題。
  if (twoRows) setTimeout(() => fixGroupHeaderSticky(id), 0);
  if (TBLS[id].virtual) setTimeout(() => initVirtualScroll(id), 0);
  return table;
}
// 分組表頭第二列的sticky top要等於第一列實際渲染高度，不同瀏覽器/字型算出來的
// 高度會有微差，用JS量測後動態寫inline style最穩，寫死px容易跟實際高度對不齊
// 導致第二列表頭捲動時被第一列蓋住一小條或露出縫隙。
function fixGroupHeaderSticky(id){
  const wrap = document.querySelector(`[data-tbl="${id}"]`);
  if (!wrap) return;
  const tr1 = wrap.querySelector("thead tr:first-child");
  const tr2 = wrap.querySelector("thead tr:nth-child(2)");
  if (!tr1 || !tr2) return;
  const h = Math.ceil(tr1.getBoundingClientRect().height);
  tr2.style.top = (h - 6) + "px"; // 扣.tblbox的6px padding-top補償，理由見上方CSS註解
}
// 首次渲染用45px猜測列高算spacer，實際列高依內容(如nameCell兩行堆疊)會有出入，
// 量到真實高度後如果差距明顯(>2px)就用正確高度重新算一次視窗，避免捲軸總高度
// 跟畫面實際列數對不上(捲到底前就沒列可捲，或捲到底還有大片空白)。
function initVirtualScroll(id){
  const wrap = document.querySelector(`[data-tbl="${id}"]`);
  if (!wrap) return;
  const o = TBLS[id];
  const firstRow = wrap.querySelector("tbody tr:not(.vsp)");
  if (firstRow){
    const h = firstRow.getBoundingClientRect().height;
    if (h && Math.abs(h - o.rowH) > 2){
      o.rowH = h;
      wrap.querySelector("tbody").innerHTML = tblBodyHtml(id);
    }
  }
}
// 直接同步更新，不透過requestAnimationFrame：實測rAF在部分無頭/背景分頁環境
// 完全不會觸發(callback永遠不執行)，捲動視窗就卡死在初始位置。這裡的重算成本
// 本來就很低(只算一個視窗範圍+重繪~40列)，同步做也不會卡頓，不需要rAF節流。
function tblVirtualSync(box){
  const id = box.dataset.tbl;
  const o = TBLS[id];
  if (!o || !o.virtual) return;
  const startBefore = o.winStart;
  const html = tblBodyHtml(id);
  if (o.winStart !== startBefore) box.querySelector("tbody").innerHTML = html;
}
document.addEventListener("scroll", e => {
  const box = e.target;
  if (!box.classList || !box.classList.contains("tblbox")) return;
  tblVirtualSync(box);
}, true);
// 保險：scroll事件理論上該即時觸發，但實測某些情境(分頁不在前景/隱藏文件)
// 完全不會派送。定期輪詢當作backup，代價很小(只是比對winStart，真的變動才
// 重繪)，確保就算scroll事件失靈，捲動視窗最慢200ms內還是會跟上。
setInterval(() => {
  document.querySelectorAll(".tblbox").forEach(tblVirtualSync);
}, 200);
document.addEventListener("click", e => {
  const th = e.target.closest("th[data-i]");
  if (!th) return;
  const wrap = th.closest("[data-tbl]");
  if (!wrap) return;
  const o = TBLS[wrap.dataset.tbl], i = +th.dataset.i;
  if (o.sort.i === i) o.sort.d *= -1; else { o.sort.i = i; o.sort.d = 1; }
  const col = o.cols[i], d = o.sort.d;
  // col可選帶sortVal(r)：欄位內容是多行/複合資訊(如分點推估列出多個分點)時，
  // 從渲染後的文字反推排序值不可靠，改直接從資料算。沒給sortVal的欄位維持
  // 原本「渲染文字轉數字」的通用做法。
  const val = r => col.sortVal ? col.sortVal(r) : tblCellVal(tblCellText(col.f(r)));
  o.rows.sort((a,b) => {
    const x = val(a), y = val(b);
    if (x === null) return 1;
    if (y === null) return -1;
    return typeof x==="number" && typeof y==="number" ? (x-y)*d : String(x).localeCompare(String(y),"zh-Hant")*d;
  });
  wrap.scrollTop = 0;
  wrap.innerHTML = tblInner(wrap.dataset.tbl);
});

// （資料已依股票分組，同股票的列必連續，逐筆表頭不做點擊排序——排序會打散分組；
// 但合併後的「張數/金額」欄可依總金額排序整個分組順序，見BLOCK_SORT_DIR）。
let BLOCK_SORT_DIR = -1; // -1=金額大→小(預設，同build時的順序)，1=小→大
function sortBlockGroups(rows, dir){
  const by = new Map();
  for (const r of rows){ if (!by.has(r.c)) by.set(r.c, []); by.get(r.c).push(r); }
  return [...by.values()].sort((a,b) => dir*(a[0].stock_money - b[0].stock_money)).flat();
}

}

function aetfAdvice(diff){
  const L = [];
  const st = diff.stocks||[], sb = diff.subs||[];
  const co = st.filter(s=>Object.values(s.by||{}).filter(v=>v>0).length>=2).slice(0,3);
  if (co.length) L.push(`<b class="up">多檔同買</b>：${co.map(s=>esc(s.n||s.c)).join("、")}`);
  const cs = st.filter(s=>Object.values(s.by||{}).filter(v=>v<0).length>=2).slice(0,2);
  if (cs.length) L.push(`<b class="down">多檔同賣</b>：${cs.map(s=>esc(s.n||s.c)).join("、")}`);
  const inn = sb.filter(s=>s.val>0)[0], out = sb.filter(s=>s.val<0)[0];
  if (inn) L.push(`次產業最大加碼：<span class="up">${esc(cleanSub(inn.name))} +${(inn.val/1e8).toFixed(1)}億</span>`);
  if (out) L.push(`最大減碼：<span class="down">${esc(cleanSub(out.name))} ${(out.val/1e8).toFixed(1)}億</span>`);
  for (const [k,v] of Object.entries(diff.etfs||{})){
    if (v.est_flow && Math.abs(v.est_flow) >= 10e8)
      L.push(`${esc(k)} 淨${v.est_flow>0?"申購":"贖回"}約 ${(Math.abs(v.est_flow)/1e8).toFixed(0)}億`);
  }
  return L;
}

  main.innerHTML = html;

// 由前端直呼FinMind專屬endpoint（CORS開放）。token由使用者自行輸入一次、只存瀏覽器
// localStorage，不進repo/不上傳任何第三方（只隨查詢送給FinMind本身）。
const fmToken = () => localStorage.getItem("fm_token") || "";
const BK_RES = { stock:null, branch:null }; // 查詢結果快取（per 子標籤）
let BK_LOADING = null; // "stock"|"branch"|null
const wanF = v => Math.round(v/1e4).toLocaleString("en-US");            // 元→萬（無正負色）
const wanS = v => { const r = Math.round(v/1e4); return sgn(r,(r>0?"+":"")+r.toLocaleString("en-US")); }; // 元→萬（帶正負色，先捨入再判正負，避免浮點微塵給出假正負號）
const zhF = v => Math.round(v).toLocaleString("en-US");                 // 張（無正負色）
const zhS = v => { const r = Math.round(v); return sgn(r,(r>0?"+":"")+r.toLocaleString("en-US")); };      // 張（帶正負色，同上）
function brokerTabHtml(d){

  if (state.bkSub === "list"){
    h += sec("券商分點清單", `共 ${(bk.list||[]).length} 個分點 · 輸入名稱模糊查找 · 點列可跳到「單點」查該分點進出`);

    h += `<div id="bkListArea">${bkListTableHtml(bk.list||[])}</div>`;

  if (!fmToken()){
    h += `<div class="mcard" style="font-size:.82rem">此功能即時查詢 FinMind API，需要你自己的 FinMind token（Sponsor等級）。`
      + `token 只儲存在你這台瀏覽器的 localStorage，不會寫入網站或傳給 FinMind 以外的任何地方。`
      + `<div class="qrow" style="margin-top:8px"><input id="bkTok" type="password" placeholder="貼上 FinMind API token…">`
      + `<span class="qbtn" data-bktoksave>儲存</span></div></div>`;
  }
  h += sec(isBranch?"單點進出":"個股分點進出",
    `${esc(bk.date||"")} · ${isBranch?"輸入券商分點代號（見「清單」標籤），查該分點當日全部進出個股":"輸入股票代號，查該股當日全部進出分點"}`);
  h += `<div class="mcard" style="padding:10px 14px"><div class="qrow">`
    + `<input id="bkQ_${kind}" type="search" placeholder="${isBranch?"分點代號，如 9268、1560":"股票代號，如 2330"}" value="${esc((BK_RES[kind]&&BK_RES[kind].id)||"")}">`
    + `<span class="qbtn" data-bkgo="${kind}">查詢</span>`
    + (fmToken()?`<span class="mut" style="font-size:.74rem;cursor:pointer" data-bktokclear>token已設定（點此清除）</span>`:"")
    + `</div></div>`;

  else if (BK_RES[kind] && BK_RES[kind].error) h += `<div class="empty">查詢失敗：${esc(BK_RES[kind].error)}</div>`;
  else if (BK_RES[kind]) h += bkResultTableHtml(BK_RES[kind]);

function bkListTableHtml(list){
  // 模糊比對：先剝掉兩邊的分隔符（清單名稱是「凱基-台北」帶連字號，使用者
  // 多半輸入「凱基台北」）。\W在JS是ASCII-only會把中文也剝掉，要用\p{L}\p{N}。
  const norm = s => String(s||"").toLowerCase().replace(/[^\p{L}\p{N}]+/gu, "");
  const q = norm(state.bkListQuery);
  const rows = q ? list.filter(x => norm(x.name).includes(q) || norm(x.id).includes(q)) : list;
  if (!rows.length) return `<div class="empty">查無符合「${esc(state.bkListQuery)}」的分點</div>`;
  return tbl([
    {h:"代號",cls:"l",f:r=>`<span class="clk" data-bkjump="${esc(r.id)}"><span class="code">${esc(r.id)}</span></span>`},
    {h:"分點名稱",cls:"l",f:r=>`<span class="clk" data-bkjump="${esc(r.id)}">${esc(r.name)}</span>`},
    {h:"地址",cls:"l",f:r=>esc(r.addr||"")}], rows);
}
function bkResultTableHtml(res){
  const rows = res.rows;
  if (!rows.length) return `<div class="empty">「${esc(res.id)}」${res.kind==="branch"?"該分點":"該股"}當日（${esc(res.date)}）查無進出資料</div>`;
  const t = res.totals;
  const isBranch = res.kind === "branch";
  const cols = [
    {h:isBranch?"代號":"券商代號",cls:"l",f:r=>`<span class="code">${esc(r.id)}</span>`},
    {h:isBranch?"個股名稱":"分點名稱",cls:"l",f:r=>esc(r.name||"")},
    {h:"買(張)",f:r=>zhF(r.b_sh),sortVal:r=>r.b_sh},
    {h:"賣(張)",f:r=>zhF(r.s_sh),sortVal:r=>r.s_sh},
    {h:"買賣超(張)",f:r=>zhS(r.b_sh-r.s_sh),sortVal:r=>r.b_sh-r.s_sh},
    {h:"買金額(萬)",f:r=>wanF(r.b_amt),sortVal:r=>r.b_amt},
    {h:"賣金額(萬)",f:r=>wanF(r.s_amt),sortVal:r=>r.s_amt},
    {h:"買賣超金額(萬)",f:r=>wanS(r.b_amt-r.s_amt),sortVal:r=>r.b_amt-r.s_amt},
    {h:"買加賣(萬)",f:r=>wanF(r.b_amt+r.s_amt),sortVal:r=>r.b_amt+r.s_amt}];
  const totals = ["合計", `${rows.length}${isBranch?"檔":"分點"}`,
    zhF(t.b_sh), zhF(t.s_sh), zhS(t.b_sh-t.s_sh),
    wanF(t.b_amt), wanF(t.s_amt), wanS(t.b_amt-t.s_amt), wanF(t.b_amt+t.s_amt)];
  let h = sec(`${esc(res.id)} ${esc(res.name||"")}`, `${esc(res.date)} · ${rows.length} ${isBranch?"檔個股":"個分點"} · 依買加賣金額排序 · 點表頭可再排序`);
  h += tbl(cols, rows, {totals, s2:true});
  h += `<div class="mut" style="font-size:.74rem;margin:2px 4px 8px">金額＝Σ(各價位成交價×股數)，單位萬元；張數＝股數/1000四捨五入（零股會顯示為0張但金額仍計入）。</div>`;
  return h;
}
async function bkQuery(kind){
  const inp = document.getElementById("bkQ_"+kind);
  const id = (inp ? inp.value : "").trim();
  if (!id) return;
  if (!fmToken()){ alert("請先輸入並儲存 FinMind token"); return; }
  const bk = (state.pm && state.pm.brokers) || {};
  const date = bk.date || "";
  BK_LOADING = kind; render();
  try{
    const p = new URLSearchParams({ dataset:"TaiwanStockTradingDailyReport", date, token: fmToken() });
    p.set(kind==="stock" ? "data_id" : "securities_trader_id", id);
    const r = await fetch("https://api.finmindtrade.com/api/v4/taiwan_stock_trading_daily_report?"+p.toString());
    const j = await r.json();
    if (!r.ok || (j.status && j.status !== 200)) throw new Error(j.msg || ("HTTP "+r.status));
    const raw = j.data || [];
    // 原始為 分點×股票×價位 明細（buy/sell單位=股），聚合成每列一個對象：
    // 單點查詢→依股票聚合；個股查詢→依分點聚合。金額=Σ(價×股數)，元。
    const agg = new Map();
    for (const x of raw){
      const key = kind==="branch" ? x.stock_id : x.securities_trader_id;
      let o = agg.get(key);
      if (!o){
        o = { id:key, name: kind==="branch" ? (BK_NM[key]||"") : (x.securities_trader||""),
              b_sh:0, s_sh:0, b_amt:0, s_amt:0 };
        agg.set(key, o);
      }
      o.b_sh += (x.buy||0)/1000; o.s_sh += (x.sell||0)/1000;
      o.b_amt += (x.buy||0)*(x.price||0); o.s_amt += (x.sell||0)*(x.price||0);
    }
    // b_sh/s_sh保留原始小數（零股），顯示時才捨入。若在這裡先逐列round再加總，
    // 合計會偏離真值（實測差52張），且個股的買賣超合計會出現假的非零值
    // （一檔股票全市場買股數必等於賣股數，合計買賣超必為0）。
    const rows = [...agg.values()];
    rows.sort((a,b) => (b.b_amt+b.s_amt)-(a.b_amt+a.s_amt));
    const totals = rows.reduce((t,o)=>({b_sh:t.b_sh+o.b_sh, s_sh:t.s_sh+o.s_sh,
      b_amt:t.b_amt+o.b_amt, s_amt:t.s_amt+o.s_amt}), {b_sh:0,s_sh:0,b_amt:0,s_amt:0});
    const name = kind==="branch"

// key 只存本機 localStorage，只隨查詢送給 Anthropic，不進 repo、不傳第三方。
const anthKey = () => localStorage.getItem("anthropic_key") || "";
// 台灣時間 "YYYY-MM-DD HH:MM:SS"（sv-SE locale 給 ISO 樣式，指定 Asia/Taipei 時區）
const twNow = () => new Date().toLocaleString("sv-SE", { timeZone:"Asia/Taipei" });
// ---------- 雲端儲存共用（GitHub Contents API；三站逐字相同：postmkt /
// taiwan-flow-live-v2 / taiwan-stock-news，修改請三站同步）----------
// PAT 只存本機 localStorage（gh_token），只隨請求送給 GitHub API 本身，不進 repo、不傳第三方。
const ghToken = () => localStorage.getItem("gh_token") || "";
// 台北日 YYYYMMDD（檔名用）
const twDay8 = () => twNow().slice(0, 10).replace(/-/g, "");
// base64 ⇄ UTF-8：btoa/atob 只吃 Latin-1，中文要先過 TextEncoder/TextDecoder
const b64EncodeUtf8 = s => { const b = new TextEncoder().encode(s); let r = ""; for (let i = 0; i < b.length; i += 0x8000) r += String.fromCharCode.apply(null, b.subarray(i, i + 0x8000)); return btoa(r); };
const b64DecodeUtf8 = s => { const bin = atob(String(s || "").replace(/\s+/g, "")); const b = new Uint8Array(bin.length); for (let i = 0; i < bin.length; i++) b[i] = bin.charCodeAt(i); return new TextDecoder().decode(b); };
// 分析結果存 GitHub（shihpc/postmkt main 的 data/analyses/{fileName}）：
// GET 現檔（404=新檔）→ 解出當日陣列 → push entry → 超過 10 筆丟最舊 → PUT（帶 sha 防蓋寫）。
// 409/422（寫入衝突）→ 重新 GET 再試一次。回傳 {ok, err}；呼叫端自行決定怎麼呈現。
async function ghSaveAnalysis(fileName, entry){
  const token = ghToken();
  if (!token) return { ok: false, err: "未設定 GitHub token" };
  const api = "https://api.github.com/repos/shihpc/postmkt/contents/data/analyses/" + fileName;
  const headers = { "Authorization": "Bearer " + token, "Accept": "application/vnd.github+json" };
  const attempt = async () => {
    let sha = null, arr = [];
    const g = await fetch(api + "?ref=main", { headers });
    if (g.status === 200){
      const j = await g.json();
      sha = j.sha || null;
      try { const cur = JSON.parse(b64DecodeUtf8(j.content || "")); if (Array.isArray(cur)) arr = cur; } catch (e) {}
    } else if (g.status !== 404){
      throw new Error("讀取現檔失敗 HTTP " + g.status);
    }
    arr.push(entry);
    while (arr.length > 10) arr.shift();
    const body = { message: "analysis: " + fileName.replace(/-\d{8}\.json$/, "") + " " + String(entry.at || "").slice(0, 16),
      content: b64EncodeUtf8(JSON.stringify(arr)), branch: "main" };
    if (sha) body.sha = sha;
    const p = await fetch(api, { method: "PUT", headers, body: JSON.stringify(body) });
    if (p.status === 409 || p.status === 422) return { conflict: true };
    if (!p.ok){ const j = await p.json().catch(() => ({})); throw new Error("PUT HTTP " + p.status + (j.message ? "：" + j.message : "")); }
    return { conflict: false };
  };
  try {
    let r = await attempt();
    if (r.conflict) r = await attempt();
    if (r.conflict) throw new Error("寫入衝突（重試一次仍失敗）");
    return { ok: true, err: null };
  } catch (e) {
    return { ok: false, err: String(e.message || e) };
  }
}

// 極簡 markdown→HTML（LLM 輸出用）：標題/清單/粗體/行內碼/表格/段落。夠用即可，不引入外部庫。
function mdToHtml(md){
  const esc2 = s => s.replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
  const inline = s => esc2(s).replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
    .replace(/`([^`]+)`/g,"<code>$1</code>");
  const lines = String(md||"").split("\n");
  let html = "", i = 0;
  while (i < lines.length){
    const ln = lines[i];
    if (/^\s*\|.*\|\s*$/.test(ln) && i+1<lines.length && /^\s*\|[\s:|-]+\|\s*$/.test(lines[i+1])){
      const cell = r => r.replace(/^\s*\|/,"").replace(/\|\s*$/,"").split("|").map(c=>c.trim());
      const head = cell(ln); i += 2;
      let body = "";
      while (i < lines.length && /^\s*\|.*\|\s*$/.test(lines[i])){ body += "<tr>"+cell(lines[i]).map(c=>`<td>${inline(c)}</td>`).join("")+"</tr>"; i++; }
      html += `<table><thead><tr>${head.map(c=>`<th>${inline(c)}</th>`).join("")}</tr></thead><tbody>${body}</tbody></table>`;
      continue;
    }
    let m;
    if ((m = ln.match(/^##\s+(.*)/))) html += `<h2>${inline(m[1])}</h2>`;
    else if ((m = ln.match(/^###\s+(.*)/))) html += `<h3>${inline(m[1])}</h3>`;
    else if (/^\s*[-*]\s+/.test(ln)){
      let items = "";
      while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])){ items += `<li>${inline(lines[i].replace(/^\s*[-*]\s+/,""))}</li>`; i++; }
      html += `<ul>${items}</ul>`; continue;
    }
    else if (ln.trim()==="") { /* skip */ }
    else html += `<p>${inline(ln)}</p>`;
    i++;
  }
  return html;
}
// 個股代號→Yahoo 技術分析連結（三站逐字相同：postmkt / taiwan-flow-live-v2 /
// taiwan-stock-news，修改請三站同步）。在 mdToHtml 輸出後呼叫；用 tag 切分法只處理
// 標籤外的文字片段，不破壞既有 HTML、也天然不會重包已在 <a> 內的文字。
// 防誤連雙層：①候選 ∈ knownSet（頁面記憶體已知代號）②兜底＝代號後緊跟中文股名
// （首字不在單位黑名單）。緊鄰英數/小數點、或後接 -、/（日期 2026-07-11）皆不連。
function linkifyStocks(html, knownSet){
  const BLACK = "年月日時分點張口億萬元筆家檔次倍天週股"; // 單位/時間字：後接這些多半不是股名
  const CJK = ch => !!ch && /[一-鿿]/.test(ch);
  const link = c => `<a href="https://tw.stock.yahoo.com/quote/${c}/technical-analysis" target="_blank" rel="noopener" class="slink">${c}</a>`;
  return String(html||"").split(/(<[^>]*>)/).map(seg => {
    if (seg.charAt(0) === "<") return seg;
    return seg.replace(/(00[0-9]{3,4}[A-Z]?|[0-9]{4}[A-Z]?)/g, (m, _g, off) => {
      const prev = seg.charAt(off-1), next = seg.charAt(off+m.length);
      const n2 = seg.charAt(off+m.length+1), n3 = seg.charAt(off+m.length+2);
      if (/[0-9A-Za-z.]/.test(prev) || /[0-9.\-\/]/.test(next)) return m;
      if (CJK(next)){
        // 兜底：後緊跟中文股名。首字在黑名單→不連（含集合內代號，防「2026年」誤連）；
        // 「元」例外：元+中文次字視為元大/元太等股名，但「元大關」（千元大關）除外。
        const ok = next === "元" ? (CJK(n2) && !(n2 === "大" && n3 === "關"))
                                 : !BLACK.includes(next);
        return ok ? link(m) : m;
      }
      return (knownSet && knownSet.has(m)) ? link(m) : m;
    });
  }).join("");
}
// 已知個股代號集合（linkifyStocks 主驗證用）：從本頁記憶體各表收集；

// 從各 tab 的記憶體資料彙整成給 LLM 的精簡文字（不 dump 全量，只取關鍵訊號欄位）。
// 日期對齊：以 postmkt 主資料日(primary)為準，各段標注自己的資料日；不同日的段落
// 明確標警告，避免 LLM 跨不同交易日直接比較(雞同鴨講)。回傳 {text, primary, dates}。
function insightGatherContext(){
  const d = state.pm || {}, a = state.aetf || {};
  const parts = [];
  const yiK = v => v==null ? "—" : (v/1e5).toFixed(1); // 千元→億
  const yiY = v => v==null ? "—" : (v/1e8).toFixed(1); // 元→億
  const primary = d.date || "";
  const dates = {};
  // 日期比較用正規化（aetf 跨repo用斜線 2026/07/13，postmkt 用連字號 2026-07-09，
  // 格式不同會誤判成不同日，比較前統一成連字號）。
  const norm = s => String(s||"").replace(/\//g,"-");
  const dlabel = (name, secDate) => {
    dates[name] = secDate || "?";
    if (!secDate) return `【${name}（資料日不明）】`;
    if (norm(secDate) === norm(primary)) return `【${name}（資料日 ${secDate}）】`;
    return `【${name}（⚠資料日 ${secDate}，與主資料日 ${primary} 不同，請勿與其他段落跨日直接比較）】`;
  };
  // 主動ETF（跨repo，投信揭露日常與盤後籌碼不同日，特別要標）
  if (a.diff && (a.diff.stocks||[]).length){
    const aDate = (a.diff.generated_dates && a.diff.generated_dates[a.diff.generated_dates.length-1])
      || (a.latest && a.latest.run_date) || "";
    const adv = aetfAdvice(a.diff);
    const st = (a.diff.stocks||[]).slice(0,12).map(s=>`${s.c}${s.n||""} 合計${s.zh>0?"+":""}${s.zh}張 金額${yiY(s.val)}億`).join("；");
    const subs = (a.diff.subs||[]).slice(0,6).map(s=>`${cleanSub(s.name)} ${yiY(s.val)}億`).join("；");
    parts.push(`${dlabel("主動ETF 主動加減碼", aDate)}\n重點：${adv.map(x=>x.replace(/<[^>]+>/g,"")).join("；")||"—"}\n進出個股(前12)：${st}\n次產業流向(前6)：${subs}`);
  }
  // 三大法人買賣超（跨repo：盤後法人動態站 taiwan-flows；資料缺漏時整段略過）
  const tf = state.tf || {};
  const fPg = (tf.pages && tf.pages.foreign) || null;
  const tPg = (tf.pages && tf.pages.trust) || null;
  if (fPg || tPg){
    const tfYi = v => v==null ? "—" : ((v>0?"+":"")+(v/1e5).toFixed(1)); // 千元→億(帶正負號)
    const pct = v => v==null ? "—" : (v>0?"+":"")+v.toFixed(1);
    const row = r => `${r.code}${r.name||""} ${tfYi(r.net_amt_k)}億/${num(r.net_lots)}張 持股${r.hold_pct==null?"—":r.hold_pct.toFixed(1)}% 漲跌${pct(r.chg_pct)}%`;
    const seg = [];
    if (fPg){
      seg.push(`外資買超前10：${(fPg.buy_by_amt||[]).slice(0,10).map(row).join("；")||"—"}`);
      seg.push(`外資賣超前6：${(fPg.sell_by_amt||[]).slice(0,6).map(row).join("；")||"—"}`);
      const fc = fPg.futures_card;
      if (fc) seg.push(`外資台指期未平倉：淨${num(fc.oi_net_lots)}口，較上月底(${fc.prev_month_end||"—"})${fc.vs_prev_month_lots>0?"+":""}${num(fc.vs_prev_month_lots)}口`);
    }
    if (tPg){
      seg.push(`投信買超前10：${(tPg.buy_by_amt||[]).slice(0,10).map(row).join("；")||"—"}`);
      seg.push(`投信賣超前6：${(tPg.sell_by_amt||[]).slice(0,6).map(row).join("；")||"—"}`);
    }
    if (seg.length) parts.push(`${dlabel("三大法人買賣超（盤後法人動態站）", tf.date)}\n`+seg.join("\n"));
  }
  // 融借券整合排行（依兩平台借券餘額；含放空/融資/當沖/三大法人）
  const lr = (d.lending && d.lending.rows) || [];
  if (lr.length){
    const line = r => `${r.c}${r.n||""}|借券餘額${num(r.plat_total)}張(異動${r.plat_total_chg>0?"+":""}${r.plat_total_chg})|借賣${num(r.sbl_short_bal)}張(異動${r.sbl_short_chg>0?"+":""}${r.sbl_short_chg},使用率${r.usage_ratio==null?"—":r.usage_ratio.toFixed(0)}%)|融資${num(r.margin_bal)}張(異動${r.margin_chg>0?"+":""}${r.margin_chg},券資比${r.credit_ratio==null?"—":r.credit_ratio.toFixed(1)}%)|外資${yiK(r.foreign_net)}億/投信${yiK(r.trust_net)}億/自營${yiK(r.dealer_net)}億|當沖${yiK(r.dt_amt)}億`;
    parts.push(`${dlabel("融借券整合排行 前25（依兩平台借券餘額）", (d.lending&&d.lending.date))}\n`+lr.slice(0,25).map(line).join("\n"));
  }
  // 當沖排行
  const dt = (d.daytrading && d.daytrading.by_amount) || [];
  if (dt.length){
    const line = r => `${r.c}${r.n||""}|當沖${yiY(r.amt)}億 量${num(r.vol/1000)}張 比重${r.ratio==null?"—":r.ratio.toFixed(0)}%|漲跌${r.chg_pct==null?"—":(r.chg_pct>0?"+":"")+r.chg_pct.toFixed(1)}% 振幅${r.amp_pct==null?"—":r.amp_pct.toFixed(1)}%|分點推估:${(r.traders||[]).slice(0,3).map(t=>t.trader+num(t.vol)+"張").join(",")}`;
    parts.push(`${dlabel("當沖排行 前15", (d.daytrading&&d.daytrading.date))}\n`+dt.slice(0,15).map(line).join("\n"));
  }
  // 鉅額（依股票分組，取各股一筆代表＝總量/總額）
  const bt = (d.blocktrade && d.blocktrade.rows) || [];
  if (bt.length){
    const seen = new Set(), groups = [];
    for (const r of bt){ if (!seen.has(r.c)){ seen.add(r.c); groups.push(r); } }
    parts.push(`${dlabel("鉅額交易 依總金額前15", (d.blocktrade&&d.blocktrade.date))}\n`+groups.slice(0,15).map(r=>`${r.c}${r.n||""} 總${num((r.stock_vol||0)/1000)}張/${yiY(r.stock_money)}億`).join("；"));

// 即時抓指定分點當日進出（FinMind），依股票聚合成買賣超金額，回傳各分點的前N買/賣。
// primary=主資料日，分點資料日不同時標警告(日期對齊)。
async function insightFetchBrokers(primary){
  if (!fmToken()) return { text:"【指定分點單點進出】（未設定 FinMind token，略過分點分析）", ok:false };
  const date = (state.pm && state.pm.brokers && state.pm.brokers.date) || "";
  const dwarn = (date && primary && date !== primary) ? `（⚠資料日 ${date}，與主資料日 ${primary} 不同，勿跨日比較）` : `（資料日 ${date||"?"}）`;
  const nm = (state.pm && state.pm.brokers && state.pm.brokers.list) || [];
  const nmById = Object.fromEntries(nm.map(x=>[x.id, x.name]));
  const out = [];
  for (const id of INSIGHT_BROKERS){
    try{
      const p = new URLSearchParams({ dataset:"TaiwanStockTradingDailyReport", date, securities_trader_id:id, token: fmToken() });
      const r = await fetch("https://api.finmindtrade.com/api/v4/taiwan_stock_trading_daily_report?"+p.toString());
      const j = await r.json();
      const raw = (r.ok && (!j.status || j.status===200)) ? (j.data||[]) : [];
      const bname = (raw[0] && raw[0].securities_trader) || nmById[id] || id;
      const agg = new Map();
      for (const x of raw){ let o = agg.get(x.stock_id); if(!o){ o={ c:x.stock_id, net:0 }; agg.set(x.stock_id,o); }
        o.net += ((x.buy||0)-(x.sell||0))*(x.price||0); }
      const rows = [...agg.values()];
      const buys = rows.filter(o=>o.net>0).sort((a,b)=>b.net-a.net).slice(0,8);
      const sells = rows.filter(o=>o.net<0).sort((a,b)=>a.net-b.net).slice(0,8);
      const fmt = o => `${o.c}${(BK_NM[o.c]||"")}${(o.net/1e4).toFixed(0)}萬`;
      out.push(`[${id} ${bname}] 買超前8：${buys.map(fmt).join(",")||"—"}｜賣超前8：${sells.map(fmt).join(",")||"—"}`);
    }catch(e){ out.push(`[${id}] 查詢失敗：${String(e.message||e)}`); }
  }
  return { text:`【指定分點單點進出（買賣超金額，元）${dwarn}】\n`+out.join("\n"), ok:true };
}
// 打開 adaptive thinking：Opus 4.8 省略 thinking=不思考，故明確指定；effort medium 平衡
// 深度與延遲；只取 text block(thinking display 預設 omitted，不渲染思考)。max_tokens 拉高
// 給思考+輸出留空間。signal 為可選 AbortSignal（中斷用），不傳＝行為不變；
// 中斷時把 AbortError 轉成好讀的「已手動中斷」。
// 【三站同步】本函式在 postmkt／taiwan-flow-live-v2／taiwan-stock-news 逐字一致，改動需同步三站。
async function callClaude(key, model, system, userMsg, signal){
  try{
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{ "content-type":"application/json", "x-api-key":key,
        "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
      body: JSON.stringify({ model, max_tokens:8000,
        thinking:{ type:"adaptive" }, output_config:{ effort:"medium" },
        system, messages:[{role:"user",content:userMsg}] }),
      signal
    });
    const j = await r.json();
    if (!r.ok || (j.type==="error")) throw new Error((j.error && j.error.message) || ("HTTP "+r.status));
    if (j.stop_reason === "refusal") throw new Error("模型基於安全政策婉拒本次請求");
    const text = (j.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
    return { text, usage: j.usage || null };
  }catch(e){
    if (e && e.name === "AbortError") throw new Error("已手動中斷");
    throw e;
  }
}

// 頁面2：即時類股動態——移植自 taiwan-flow-live-v2/index.html insightGatherContext，
// state.live→liveData、state.cl→clMap，段落 a-d 與欄位保持等價。
function sumCtxLive(live, cl){
  if(!live) return { text:"", primary:"", dates:{} };
  const parts = [];
  // 主資料日：ts 內含日期就用 ts，否則由 generated_at 換算台灣日期
  const tsm = String(live.ts||"").match(/\d{4}[-\/]\d{2}[-\/]\d{2}/);
  const primary = tsm ? tsm[0].replace(/\//g,"-")
    : (live.generated_at ? new Date(live.generated_at).toLocaleDateString("sv-SE",{timeZone:"Asia/Taipei"}) : "");
  const dates = {};
  const norm = s => String(s||"").replace(/\//g,"-");
  const dlabel = (name, secDate) => {
    dates[name] = secDate || "?";
    if (!secDate) return `【${name}（資料日不明）】`;
    if (norm(secDate) === norm(primary)) return `【${name}（資料日 ${secDate}）】`;
    return `【${name}（⚠資料日 ${secDate}，與主資料日 ${primary} 不同，請勿與其他段落跨日直接比較）】`;
  };
  const f1 = v => v==null ? "—" : v.toFixed(1);
  const f2s = v => v==null ? "—" : (v>0?"+":"")+v.toFixed(2);
  // v2 的 cleanSub 語意（去掉括號內說明）與本頁 cleanSub（去掉「·」前綴）不同，須用 v2 版
  const cleanSubV2 = s => (s||"").replace(/\s*[（(].*$/,"");
  // sval 解碼：live.stocks 為陣列，依 stock_cols（缺時用 SUM_SC 後備）對映成物件
  const sval2 = code => { const a=(live.stocks||{})[code]; if(!a) return null;
    const cols = live.stock_cols || SUM_SC; const o={}; cols.forEach((k,i)=>o[k]=a[i]); return o; };
  // a. 大盤：加權/櫃買指數 ＋ 漲跌家數/成交值
  {
    const ix = live.index||{}, mk = live.market||{};
    const one = (label, d, m) => {
      const l = [];
      // chgP=漲跌點數、chg=漲跌%（worker idxOut 定義），兩者都給模型
      if (d && d.val!=null) l.push(`${label}指數 ${d.val.toFixed(2)}（${f2s(d.chgP)}點/${f2s(d.chg)}%）成交${f1(d.amt_yi)}億`);
      if (m) l.push(`漲${m.up??"—"}(漲停${m.up_lim||0})/跌${m.down??"—"}(跌停${m.down_lim||0})/平${m.flat??"—"}${m.amt_yi!=null?` 分類股總額${f1(m.amt_yi)}億`:""}`);
      return l.join("，");
    };
    const a = one("加權", ix.tse, mk.tse), b = one("櫃買", ix.otc, mk.otc);
    if (a||b) parts.push(`${dlabel("大盤即時", primary)}\n${[a,b].filter(Boolean).join("\n")}`);
  }
  // b. 產業別資金：exchange 依 tse.amt_yi 前8強＋依平均漲跌跌勢前5
  {
    const ex = (live.exchange||[]).map(s=>({sector:s.sector, ...(s.tse||{})})).filter(r=>(r.n||0)>0);
    if (ex.length){
      const line = r => `${r.sector} 成交${f1(r.amt_yi)}億 平均${f2s(r.avg_chg)}% 貢獻${f2s(r.pts)}點 漲${r.up}/跌${r.down}(${r.n}檔)`;
      const top = [...ex].sort((a,b)=>(b.amt_yi||0)-(a.amt_yi||0)).slice(0,8);
      const weak = [...ex].filter(r=>(r.avg_chg||0)<0).sort((a,b)=>(a.avg_chg||0)-(b.avg_chg||0)).slice(0,5);
      const seg = [`資金前8強：\n${top.map(line).join("\n")}`];
      if (weak.length) seg.push(`跌勢前5：\n${weak.map(line).join("\n")}`);
      parts.push(`${dlabel("產業別資金（加權市場）", primary)}\n${seg.join("\n")}`);
    }
  }
  // c. 資金湧入：flow.subs 依集中10分(c1) 前12；盤前/盤後 flow=null 明確註明
  {
    const fl = live.flow;
    if (!fl || !(fl.subs||[]).length){
      parts.push(`${dlabel("次產業盤中資金集中", primary)}\n盤前，無盤中資金集中資料。`);
    } else {
      const subs = [...fl.subs].sort((a,b)=>((b.c1!=null?b.c1:(b.d_yi||0))-(a.c1!=null?a.c1:(a.d_yi||0)))).slice(0,12);
      const line = s => `${cleanSubV2(s.name)} 近10分${f1(s.d_yi)}億 集中10分${s.c1==null?"—":s.c1.toFixed(2)}× 集中30分${s.c2==null?"—":s.c2.toFixed(2)}× 窗內${f2s(s.ret)}%`;
      parts.push(`${dlabel("次產業盤中資金集中（依集中10分倍數）", primary)}\n${subs.map(line).join("\n")}`);
    }
  }
  // d. 個股資金集中：sval 解碼，篩有盤中欄位(c10) 者，依 c10 前15；無盤中欄位則整段略過
  {
    const rows = Object.keys(live.stocks||{}).map(c=>{const v=sval2(c); return v&&v.c10!=null?{c,...v}:null;})
      .filter(Boolean).sort((a,b)=>((b.c10!=null?b.c10:(b.c30||0))-(a.c10!=null?a.c10:(a.c30||0)))).slice(0,15);
    if (rows.length){
      const line = r => {
        const nm = (cl && cl[r.c] && cl[r.c].n) || "";
        return `${r.c}${nm} 集中10分${r.c10==null?"—":r.c10.toFixed(2)}×/30分${r.c30==null?"—":r.c30.toFixed(2)}× 漲跌${f2s(r.chg)}% 投信連買${r.it||0}日/外資連買${r.fi||0}日 法人強度${r.ints==null?"—":f2s(r.ints)}%`;
      };
      parts.push(`${dlabel("個股盤中資金集中 前15（依集中10分倍數）", primary)}\n${rows.map(line).join("\n")}`);
    }
  }
  return { text: parts.join("\n\n"), primary, dates };
}
// 頁面3：新聞晨報——移植自 taiwan-stock-news/index.html insightGatherContext，
// DATA→newsData、MORNING/US→參數，段落 a-d 與欄位保持等價。
function sumCtxNews(newsData, morning, us){
  const d = newsData || {};
  const day10 = s => (s || "").slice(0, 10);
  // 同篇轉載去重 key（與 news 站 looseTitleKey 等價；\W 是 ASCII-only 會砍中文，用 \p{L}\p{N}）
  const TITLE_TAIL_RE = /^(.+?)\s+[-—–|]\s+([^-—–|]{1,20})$/;
  const looseTitleKey = title => {
    const t = (title || "").trim();
    const m = t.match(TITLE_TAIL_RE);
    const body = m ? m[1].trim() : t;
    return body.replace(/[^\p{L}\p{N}]+/gu, "").toLowerCase();
  };
  const tdays = (d.trading_days || []).slice().sort();
  const primary = (tdays.length ? tdays[tdays.length-1] : "") || day10(d.generated_at || "");
  const dates = {};
  const norm = s => String(s||"").replace(/\//g,"-");
  const dlabel = (name, secDate) => {
    dates[name] = secDate || "?";
    if (!secDate) return `【${name}（資料日不明）】`;
    if (norm(secDate) === norm(primary)) return `【${name}（資料日 ${secDate}）】`;
    return `【${name}（⚠資料日 ${secDate}，與主資料日 ${primary} 不同，請勿與其他段落跨日直接比較）】`;
  };
  const parts = [];
  // a. 大盤與財金焦點新聞：全部 impact=market，去重（同文轉載）後依日期新→舊取前12
  const mkt = [], seen = new Set();
  (d.stocks||[]).forEach(s => (s.news||[]).forEach(n => {
    if (n.impact !== "market") return;
    const key = looseTitleKey(n.title);
    if (key && seen.has(key)) return;
    if (key) seen.add(key);
    mkt.push(n);
  }));
  mkt.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  if (mkt.length){
    parts.push(`${dlabel("大盤與財金焦點新聞 前12（新→舊）", primary)}\n`
      + mkt.slice(0,12).map(n=>`${day10(n.date)}|${n.source}|${n.title}`).join("\n"));
  }
  // b. 個股新聞熱度：依新聞則數前15，每檔附產業/權重/最新2則標題
  const tops = (d.stocks||[]).slice()
    .sort((a,b)=>(b.count||(b.news||[]).length) - (a.count||(a.news||[]).length)).slice(0,15);
  if (tops.length){
    const line = s => {
      const ns = (s.news||[]).slice().sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,2)
        .map(n=>`${day10(n.date)}《${n.title}》`).join("；");
      return `${s.stock_id}${s.name||""}${s.heavyweight?"[權值]":""}|${s.industry||"—"}`
        + `|大盤權重${s.weight_per!=null?s.weight_per+"%":"—"}|新聞${s.count||(s.news||[]).length}則|最新：${ns||"—"}`;
    };
    parts.push(`${dlabel("個股新聞熱度 前15（依新聞則數）", primary)}\n`+tops.map(line).join("\n"));
  }
  // c. 晨報籌碼（跨repo讀v2；晨報資料日常與新聞主資料日不同，dlabel會標警告）
  if (morning){
    const mDate = day10(morning.generated_at || "");
    const c = morning.chips || {}, lines = [];
    if (morning.gap){
      const g = morning.gap, s = morning.spot || {};
      lines.push(`期指開盤參考：台指期夜盤${g.close!=null?g.close:"—"}（${g.chg_pct>0?"+":""}${g.chg_pct}%）`
        + ` vs 加權收盤${s.close!=null?s.close:"—"}，價差${g.gap>0?"+":""}${g.gap}點`);
    }
    if (c.inst) lines.push(`三大法人買賣超（億）：外資${c.inst.foreign>0?"+":""}${c.inst.foreign}`
      + `｜投信${c.inst.trust>0?"+":""}${c.inst.trust}｜自營${c.inst.dealer>0?"+":""}${c.inst.dealer}`);
    if ((c.it3||[]).length) lines.push(`投信3日連買：${c.it3.map(x=>(x.c||"")+(x.n||"")).join("、")}`);
    if ((c.it3_sell||[]).length) lines.push(`投信3日連賣：${c.it3_sell.map(x=>(x.c||"")+(x.n||"")).join("、")}`);
    if ((c.aetf||[]).length) lines.push(`主動ETF動向：${c.aetf.join("；")}`);
    if (lines.length) parts.push(`${dlabel("晨報籌碼", mDate)}\n`+lines.join("\n"));
    // d. 隔夜美股（與晨報同批產生，沿用晨報資料日；美股本質為隔夜資料，SYS已禁跨日串連）
    if (us){
      const uLines = [];
      if (us.brief) uLines.push(us.brief + (us.session ? `（${us.session}）` : ""));
      for (const g of (us.groups||[])){
        uLines.push(`${g.g}：${(g.rows||[]).slice(0,3)
          .map(r=>`${r.n}${r.chg!=null?(r.chg>0?"+":"")+r.chg.toFixed(2)+"%":"—"}`).join("、")}`);
      }
      if (uLines.length) parts.push(`${dlabel("隔夜美股", mDate)}\n`+uLines.join("\n"));
    }
  } else {
    parts.push("【晨報籌碼】（晨報資料未載入，本段略過，僅分析新聞面）");
  }
  return { text: parts.join("\n\n"), primary, dates };
}

        // 同頁兩份以 A/B 標籤去重（six[]、彙總 USER 標頭、渲染共用；py 自動場同規則）
        const tag = `Sonnet5-${mi===0?"A":"B"}`;
        const label = `${p.page}×${tag}`;
        jobs.push((async ()=>{
          try{
            if (p.g.err) throw new Error("（資料抓取失敗：" + p.g.err + "）");
            const res = await callClaude(key, model, p.sys, p.user(p.g), signal);
            done++; state.summaryProg = `摘要 ${done}/6：${label} 完成`; render();
            return { page:p.page, model, tag, text:res.text, usage:res.usage, ok:true };
          }catch(e){
            done++; state.summaryProg = `摘要 ${done}/6：${label} 失敗`; render();
            return { page:p.page, model, tag, text:`（該份產出失敗：${String(e.message||e)}）`, usage:null, ok:false };
          }
        })());
      });
    }
    const six = await Promise.all(jobs);
    // 手動中斷：整場停止（各份已以佔位文字標失敗），不彙總、不寫入本機/雲端
    if (signal.aborted) throw new Error("已手動中斷");
    const okCount = six.filter(s=>s.ok).length;
    if (okCount < 3) throw new Error(`僅 ${okCount}/6 份摘要成功（需 ≥3 份才彙總），本次中止`);
    // 彙總（固定 Opus 4.8）：USER＝6 份全文，以【頁面×標籤】標頭分隔（同頁兩份 A/B 去重）＋各份資料日
    state.summaryProg = `摘要完成 ${okCount}/6，彙總中…（Opus 4.8）`; render();
    const pageDate = p => p==="盤後分析" ? dates.postmkt : p==="即時類股動態" ? dates.live : dates.news;
    const USER = "以下為同一批次產出的 6 份獨立分析（各以【頁面×標籤】標頭分隔，附各份資料日）：\n\n"
      + six.map(s=>`【${s.page}×${s.tag||s.model}】（該份資料日：${pageDate(s.page)}）\n${s.text}`).join("\n\n────────\n\n");
    const res = await callClaude(key, "claude-opus-4-8", SUM_SYS_SYNTH, USER, signal);
    const result = { at: twNow(), six, synthesis:{ text:res.text, usage:res.usage }, dates };
    state.summary = result; state.sumManualOpen = null;
    // localStorage 最多 2 筆（單筆可達 ~50-100KB；quota 滿時退而只存最新 1 筆）
    try{
      let arr = [];
      try{ arr = JSON.parse(localStorage.getItem("summary_manual")||"[]"); }catch(e){ arr = []; }
      arr.unshift(result);
      localStorage.setItem("summary_manual", JSON.stringify(arr.slice(0,2)));
    }catch(e){
      try{ localStorage.setItem("summary_manual", JSON.stringify([result])); }
      catch(e2){ console.warn("summary_manual 寫入失敗（quota）", e2); }
    }
    // 雲端儲存（localStorage 寫完才觸發：cloud 進度欄位不落入本機備援 JSON）
    saveAnalysisCloud(result, "summary-manual",
      { at: result.at, six: result.six, synthesis: result.synthesis, dates: result.dates },
      () => { if (state.tab === "summary") render(); });
  }catch(e){
    state.summaryErr = signal.aborted
      ? "已手動中斷（已送出的呼叫仍會計費）" : String(e.message || e);
  }
  state.summaryAbort = null;
  state.summaryLoading = false; state.summaryProg = ""; render();
}
// 結果渲染（最新結果／自動檔／手動歷史共用）：彙總全文＋meta＋折疊 6 份原文
const sumTok = u => u ? `輸入 ${num((u.input_tokens||0)+(u.cache_read_input_tokens||0)+(u.cache_creation_input_tokens||0))}／輸出 ${num(u.output_tokens||0)}` : "token數不明";
function sumResultHtml(res, metaPrefix){
  const six = res.six || [];
  const inSum = six.reduce((t,s)=>t+(s.usage?((s.usage.input_tokens||0)+(s.usage.cache_read_input_tokens||0)+(s.usage.cache_creation_input_tokens||0)):0),0);
  const outSum = six.reduce((t,s)=>t+(s.usage?(s.usage.output_tokens||0):0),0);
  const sy = res.synthesis || {};
  const codeSet = stockCodeSet(); // 一次收集，彙總＋6份原文共用
  let h = `<div class="insight-meta">${metaPrefix} · 彙總 ${sumTok(sy.usage)} token · 6份合計 輸入 ${num(inSum)}／輸出 ${num(outSum)} token</div>`;
  h += `<div class="insight-card insight-md">${linkifyStocks(mdToHtml(sy.text||""), codeSet)}</div>`;
  h += `<details style="margin:8px 0 14px"><summary style="cursor:pointer;color:var(--muted);font-size:.84rem;padding:4px 2px">▸ 展開 6 份原始分析</summary>`;
  for (const s of six){
    h += `<div class="insight-meta" style="margin-top:12px">${esc(s.page)} × ${esc(s.tag||s.model)}${s.ok?"":"（失敗）"} · ${sumTok(s.usage)} token</div>`;
    h += `<div class="insight-card insight-md">${linkifyStocks(mdToHtml(s.text||""), codeSet)}</div>`;
  }
  h += `</details>`;
  return h;
}
// 自動產出 index.json（GitHub Actions 產，相對路徑；404/尚未設 Secret → 顯示說明）
let SUM_AUTO_FETCHING = false;
const SUM_AUTO_CACHE = {};
function sumLoadAutoIdx(){
  if (SUM_AUTO_FETCHING) return; SUM_AUTO_FETCHING = true;
  loadJSON("data/summary/index.json?t="+Date.now())
    .then(j=>{ state.sumAutoIdx = j || {}; })
    .catch(e=>{ state.sumAutoIdx = { err:String(e.message||e) }; })
    .then(()=>{ if (state.tab==="summary") render(); });
}
function summaryHtml(){
  let h = sec("彙總分析", "3 頁 × 2 模型 = 6 份摘要 → Opus 4.8 彙總");
  // key 輸入區：與摘要分析 tab 共用同一組 anthropic_key／同一套 data-anth-save UI
  if (!anthKey()){
    h += `<div class="mcard" style="font-size:.84rem">此功能會用你自己的 Anthropic API token 連續呼叫 Claude 7 次（6 份摘要＋1 次彙總）。`
      + `token 只存在你這台瀏覽器的 localStorage（與「摘要分析」tab 共用同一組），不會寫入網站或傳給 Anthropic 以外的任何地方。`
      + `<div class="qrow" style="margin-top:8px"><input id="anthTok" type="password" placeholder="貼上 Anthropic API token（sk-ant-…）">`
      + `<span class="qbtn" data-anth-save>儲存</span></div></div>`;
  }
  if (!fmToken()){
    h += `<div class="insight-note">⚠ 尚未設定 FinMind token（分點 tab 可設定），盤後分析頁的「指定分點」段落將略過，其餘不受影響。</div>`;
  }
  if (!ghToken()){
    h += `<div class="mcard" style="font-size:.84rem">選填：GitHub Fine-grained PAT（只勾 postmkt repo、Contents Read/write）→ 分析結果自動存雲端跨裝置讀取；不設定則只存本機。讀取歷史不需要 token。`
      + `<div class="qrow" style="margin-top:8px"><input id="ghTok" type="password" placeholder="貼上 GitHub PAT（github_pat_…）">`
      + `<span class="qbtn" data-gh-save>儲存</span></div></div>`;
  }
  h += `<div class="mcard" style="padding:12px 14px"><div class="qrow">`
    + `<span class="qbtn" data-summary-run>⚡ 產生彙總分析（6+1 次呼叫）</span>`
    + (anthKey()?`<span class="mut" style="font-size:.74rem;cursor:pointer" data-anth-clear>Anthropic token已設定（點此清除）</span>`:"")
    + (ghToken()?`<span class="mut" style="font-size:.74rem;cursor:pointer" data-gh-clear>GitHub token已設定（點此清除）</span>`:"")
    + `</div><div class="insight-note">流程：並行抓齊三頁資料（盤後分析＝本頁各 tab＋指定分點／即時類股動態＝v2 Worker 即時快照／新聞晨報＝新聞+晨報+美股）`
    + `→ 各頁以 Sonnet 5 各跑 2 次獨立分析產出 6 份摘要 → 由 Opus 4.8 融會貫通彙總。約需 1-3 分鐘、費用約每次 NT$8-10（摘要用 Sonnet 5、彙總用 Opus，計入你的 Anthropic 帳戶）。`
    + `盤前/盤後執行時即時頁天然單薄屬預期。</div></div>`;
  if (state.summaryLoading){
    h += `<div class="empty">${esc(state.summaryProg||"執行中…")}`
      + `<div style="margin-top:10px"><span class="qbtn" data-summary-abort>⏹ 中斷</span></div></div>`;
    return h;
  }
  if (state.summaryErr) h += `<div class="empty" style="text-align:left;padding:14px">彙總失敗：${esc(state.summaryErr)}</div>`;
  if (state.summary){
    const dd = state.summary.dates || {};
    h += cloudLineHtml(state.summary.cloud);
    h += sumResultHtml(state.summary,
      `生成時間 ${esc(state.summary.at)}（台灣）· 資料日 盤後 ${esc(dd.postmkt||"?")}／即時 ${esc(dd.live||"?")}／新聞 ${esc(dd.news||"?")}`);
  }
  // 歷史區⓪：雲端歷史（近3日，data/analyses/；讀取免 token，raw CDN ~5分快取）
  h += cloudHistSectionHtml();
  // 歷史區①：自動產出（GitHub Actions 早晚場，讀 data/summary/index.json）
  h += sec("自動產出（近三日）","GitHub Actions 早場08:00／晚場22:00 台北 · 點列展開閱讀");
  if (state.sumAutoIdx === undefined){
    sumLoadAutoIdx();
    h += `<div class="empty">載入自動產出清單…</div>`;
  } else if (state.sumAutoIdx && (state.sumAutoIdx.runs||[]).length){
    h += `<div class="mcard" style="padding:8px 14px">` + state.sumAutoIdx.runs.slice(0,6).map(r=>{
      const slotLabel = r.slot==="am" ? "am 早場" : r.slot==="pm" ? "pm 晚場" : esc(String(r.slot||"?"));
      return `<div class="clk ${state.sumAutoOpen===r.file?"sel":""}" data-sum-open="${esc(r.file)}" style="padding:4px 0">`
        + `<span class="code">${esc(r.date||"")}</span> ${slotLabel}`
        + `<span class="mut" style="font-size:.74rem;margin-left:8px">產出 ${esc(String(r.generated_at||"").slice(0,16).replace("T"," "))}</span></div>`;
    }).join("") + `</div>`;
    if (state.sumAutoOpen){
      const c = SUM_AUTO_CACHE[state.sumAutoOpen];
      if (!c || c === "loading") h += `<div class="empty">載入 ${esc(state.sumAutoOpen)}…</div>`;
      else if (c.err) h += `<div class="empty">讀取失敗：${esc(c.err)}</div>`;
      else h += sumResultHtml(c, `自動產出 ${esc(c.date||"")} ${c.slot==="am"?"早場":c.slot==="pm"?"晚場":esc(String(c.slot||""))} · 生成 ${esc(String(c.generated_at||"").slice(0,19).replace("T"," "))}`);
    }
  } else {
    h += `<div class="empty" style="font-size:.84rem">尚無自動產出（需在 repo Settings→Secrets 設 ANTHROPIC_API_KEY，詳 README）</div>`;
  }
  // 歷史區②：手動產出（localStorage summary_manual，近兩次）
  let manual = [];
  try{ manual = JSON.parse(localStorage.getItem("summary_manual")||"[]"); }catch(e){}
  h += sec("手動產出（近兩次）","存於本機瀏覽器 localStorage · 點列展開閱讀");
  if (manual.length){
    h += `<div class="mcard" style="padding:8px 14px">` + manual.map((r,i)=>
      `<div class="clk ${state.sumManualOpen===i?"sel":""}" data-sum-manual="${i}" style="padding:4px 0">`
      + `<span class="code">${esc(r.at||"")}</span>`
      + `<span class="mut" style="font-size:.74rem;margin-left:8px">資料日 盤後 ${esc(((r.dates||{}).postmkt)||"?")}</span></div>`).join("") + `</div>`;
    if (state.sumManualOpen != null && manual[state.sumManualOpen]){
      const r = manual[state.sumManualOpen], dd = r.dates || {};
      h += sumResultHtml(r, `手動產出 · 生成時間 ${esc(r.at||"")}（台灣）· 資料日 盤後 ${esc(dd.postmkt||"?")}／即時 ${esc(dd.live||"?")}／新聞 ${esc(dd.news||"?")}`);
    }
  } else {
    h += `<div class="empty" style="font-size:.84rem">尚無手動產出</div>`;
  }
  return h;
}
// ---------- 雲端歷史（近3日；data/analyses/ 免 token 讀取） ----------
const CLOUD_RAW = "https://raw.githubusercontent.com/shihpc/postmkt/main/data/analyses/";
const CLOUD_KINDS = [["insight-postmkt","盤後摘要"],["insight-live","即時摘要"],["insight-news","新聞摘要"],["summary-manual","彙總手動"]];
// 近 n 個台北日 YYYYMMDD（今日在前；日曆日非交易日，休市日檔案不存在→404 靜默略過）
const twDayList = n => Array.from({length:n}, (_,i) =>
  new Date(Date.now()-i*864e5).toLocaleDateString("sv-SE",{timeZone:"Asia/Taipei"}).replace(/-/g,""));
let CLOUD_HIST; // undefined=未載入、"loading"=載入中、陣列=完成
function cloudLoadHist(){
  CLOUD_HIST = "loading";
  const files = [];
  for (const d of twDayList(3)) for (const [k,label] of CLOUD_KINDS) files.push({ file:`${k}-${d}.json`, kind:k, label, day:d });
  Promise.all(files.map(f => fetch(CLOUD_RAW + f.file + "?t=" + Date.now())
      .then(r => r.ok ? r.json() : null).catch(() => null)))
    .then(res => {
      const items = [];
      res.forEach((arr,i) => { if (Array.isArray(arr)) arr.forEach(e => items.push({ ...files[i], entry:e })); });
      items.sort((a,b) => String(b.entry.at||"").localeCompare(String(a.entry.at||"")));
      CLOUD_HIST = items;
    })
    .then(() => { if (state.tab === "summary") render(); });
}
function cloudHistSectionHtml(){
  let h = sec("雲端歷史（近3日）","三站摘要＋彙總手動，存於 GitHub data/analyses/ · 點列展開閱讀");
  if (CLOUD_HIST === undefined){ cloudLoadHist(); return h + `<div class="empty">載入雲端歷史…</div>`; }
  if (CLOUD_HIST === "loading") return h + `<div class="empty">載入雲端歷史…</div>`;
  if (!CLOUD_HIST.length) return h + `<div class="empty" style="font-size:.84rem">尚無雲端儲存（設定 GitHub token 後自動儲存）</div>`;
  h += `<div class="mcard" style="padding:8px 14px">` + CLOUD_HIST.map((it,i) => {
    const dd = it.day.slice(0,4)+"-"+it.day.slice(4,6)+"-"+it.day.slice(6);
    return `<div class="clk ${state.cloudOpen===i?"sel":""}" data-cloud-open="${i}" style="padding:4px 0">`
      + `<span class="code">${esc(dd)}</span> ${esc(it.label)}`
      + `<span class="mut" style="font-size:.74rem;margin-left:8px">${esc(String(it.entry.at||"").slice(11,16))}${it.entry.model?` · ${esc(it.entry.model)}`:""}</span></div>`;
  }).join("") + `</div>`;
  const cur = state.cloudOpen != null ? CLOUD_HIST[state.cloudOpen] : null;
  if (cur){
    if (cur.kind === "summary-manual"){
      const dd = cur.entry.dates || {};
      h += sumResultHtml(cur.entry, `雲端 彙總手動 · 生成時間 ${esc(cur.entry.at||"")}（台灣）· 資料日 盤後 ${esc(dd.postmkt||"?")}／即時 ${esc(dd.live||"?")}／新聞 ${esc(dd.news||"?")}`);
    } else {
      const u = cur.entry.usage;
      const tok = u ? `輸入 ${num((u.input_tokens||0)+(u.cache_read_input_tokens||0)+(u.cache_creation_input_tokens||0))}／輸出 ${num(u.output_tokens||0)} token` : "token數不明";
      h += `<div class="insight-meta">雲端 ${esc(cur.label)} · 生成時間 ${esc(cur.entry.at||"")}（台灣）· 資料日 ${esc(cur.entry.date||"—")} · 模型 ${esc(cur.entry.model||"—")} · ${tok}</div>`;
      h += `<div class="insight-card insight-md">${linkifyStocks(mdToHtml(cur.entry.text||""), stockCodeSet())}</div>`;
    }
  }
  return h;
}
document.addEventListener("click", e => {
  const co = e.target.closest("[data-cloud-open]");
  if (!co) return;
  const i = +co.dataset.cloudOpen;
  state.cloudOpen = state.cloudOpen === i ? null : i;
  render();
});
document.addEventListener("click", e => {
  const rn = e.target.closest("[data-summary-run]");
  if (rn){ runSummary(); return; }
  const ab = e.target.closest("[data-summary-abort]");
  if (ab){ if (state.summaryAbort) state.summaryAbort.abort(); return; }
  const ao = e.target.closest("[data-sum-open]");
  if (ao){
    const f = ao.dataset.sumOpen;
    if (state.sumAutoOpen === f){ state.sumAutoOpen = null; render(); return; }
    state.sumAutoOpen = f;
    if (!SUM_AUTO_CACHE[f]){
      SUM_AUTO_CACHE[f] = "loading";
      loadJSON("data/summary/"+f+"?t="+Date.now())
        .then(j=>{ SUM_AUTO_CACHE[f] = j || { err:"空檔案" }; })
        .catch(err=>{ SUM_AUTO_CACHE[f] = { err:String(err.message||err) }; })
        .then(()=>{ if (state.tab==="summary") render(); });
    }
    render(); return;
  }
  const mo = e.target.closest("[data-sum-manual]");
  if (mo){ const i = +mo.dataset.sumManual;
    state.sumManualOpen = state.sumManualOpen===i ? null : i; render(); return; }
});

async function loadJSON(url){
  const r = await fetch(url);
  if (!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}
async function load(){
  renderTabs(); render();
  const t = Date.now();
  const pAetf = (async ()=>{
    const o = {latest:null, diff:null};
    try{ o.latest = await loadJSON(V2_BASE+"/latest.json?t="+t); }catch(e){}
    try{ o.diff = await loadJSON(V2_BASE+"/diff.json?t="+t); }catch(e){}
    state.aetf = o;
  })();
  const pPm = (async ()=>{
    try{ state.pm = await loadJSON("data/postmkt.json?t="+t); buildBkNm(); }
    catch(e){ state.pmErr = e; }
  })();
  // 三大法人買賣超（taiwan-flows 跨repo）：失敗不影響其他資料，state.tf 維持 null
  const pTf = (async ()=>{
    try{ state.tf = await loadJSON(TF_BASE+"/latest.json?t="+t); }catch(e){}
  })();
  pAetf.then(render); pPm.then(render); pTf.then(render);
  await Promise.all([pAetf, pPm, pTf]);
  render();
}
load();
