<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盤後分析 · 股市雷達</title>
<style>
  :root{
    --bg:#0b1120; --bg2:#111a2e; --card:#16213a; --card-hover:#1d2b4a;
    --line:#243556; --txt:#e6edf7; --muted:#8aa0c0; --accent:#4f9cff;
    --chip:#1b2a49;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Segoe UI","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,var(--bg2),var(--bg));
    color:var(--txt); min-height:100vh; padding:24px 16px 64px;
  }
  .wrap{max-width:880px;margin:0 auto}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .top a.back{color:var(--muted);text-decoration:none;font-size:.9rem;border:1px solid var(--line);
    border-radius:9px;padding:4px 10px;transition:.15s}
  .top a.back:hover{color:var(--accent);border-color:var(--accent)}
  header h1{font-size:1.5rem;font-weight:700;letter-spacing:.5px}
  .sub{color:var(--muted);font-size:.85rem;margin-top:6px;line-height:1.6}
  .tabs{display:flex;gap:6px;margin:14px 0 10px;flex-wrap:wrap}
  .tab{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:7px 13px;
    font-size:.86rem;color:var(--muted);cursor:pointer;user-select:none;transition:.15s;white-space:nowrap}
  .tab:hover{border-color:#33507e}
  .tab.active{color:var(--txt);border-color:var(--accent);background:var(--card-hover);font-weight:650}
  .stats{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 10px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:11px;
    padding:6px 11px;font-size:.76rem;color:var(--muted)}
  .stat b{color:var(--txt);font-weight:700;margin-right:4px}
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 16px;
    margin:10px 0;font-size:.9rem;line-height:1.7}
  .mcard b{color:var(--txt)}
  .kvgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:4px 16px;font-size:.82rem}
  .kv{display:flex;justify-content:space-between;gap:8px;padding:3px 0;border-bottom:1px solid rgba(36,53,86,.4)}
  .kv .mut{white-space:nowrap}
  /* 明細面板依資料性質分組（借券餘額/放空部位/融資/當沖/三大法人），跨滿整列寬度 */
  .kvsec{grid-column:1/-1;color:var(--accent);font-weight:700;font-size:.76rem;
    margin:10px 0 0;padding-top:8px;border-top:1px solid var(--line)}
  .kvsec:first-child{margin-top:2px;padding-top:0;border-top:none}
  .msection{margin:18px 2px 6px;font-size:.98rem;font-weight:700}
  .msection::before{content:"▸";color:var(--accent);margin-right:6px;font-size:.85rem}
  .msection .n{color:var(--muted);font-weight:400;font-size:.74rem;margin-left:8px}
  /* 表格區塊：固定高度約10列＋自己的垂直捲軸(表頭sticky需要在這個容器內才生效)。
     水平也可捲動看其餘欄位。 */
  .tblbox{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:6px 12px 10px;margin:8px 0;overflow:auto;max-height:495px}
  /* border-collapse:collapse 會讓 position:sticky 的儲存格在多數瀏覽器算圖時
     跟相鄰儲存格的邊框/內容顯示錯位(sticky格「浮起」後collapse的邊框模型撐不住)，
     這是sticky欄位左側會看到別欄資料透出來的根因。改用separate+0間距。
     border-bottom 改用 box-shadow(inset)畫格線：一般border在sticky格與相鄰格
     疊圖時，各瀏覽器對「格線該歸哪一格」算法不一致，容易在接縫處算出1px縫隙
     讓底下內容透出；box-shadow畫在自己的盒子內側，不受相鄰格影響，不會有縫。
     will-change:transform 讓sticky格獨立成合成層：手機慣性捲動(momentum scroll)
     時，若sticky格跟一般格在同一層合成，捲動最後一刻常有一楨no同步，讓後面
     的欄位在sticky格左/上緣「閃」一下穿幫，這是Safari/行動瀏覽器常見sticky
     渲染bug，強制GPU合成層可以避免。 */
  .mtable{width:100%;border-collapse:separate;border-spacing:0;font-size:.84rem}
  .mtable th,.mtable td{padding:6px 7px;text-align:right;box-shadow:inset 0 -1px 0 rgba(36,53,86,.5);
    white-space:nowrap;vertical-align:middle;background:var(--card)}
  .mtable tr:last-child td{box-shadow:none}
  .mtable th:first-child,.mtable td:first-child{text-align:left}
  /* 真正的穿幫根因找到了：.tblbox有padding(top6px/left12px)，但overflow的裁切邊界
     是padding box(含padding)，而position:sticky的top:0/left:0是貼齊content
     edge(padding之內)算，兩者之間就差padding那幾px——捲動時，被捲過去的內容
     還沒被裁切掉之前，會在這條padding縫隙裡短暫露出，就是先前多次修border-
     collapse/box-shadow/will-change都修不掉的「穿幫」。真正的解法：sticky的
     top/left直接設成-padding值，讓貼齊的邊界跟裁切邊界重合，縫隙歸零。 */
  .mtable th{color:var(--muted);font-weight:600;font-size:.74rem;cursor:pointer;user-select:none;
    position:sticky;top:-6px;z-index:2;will-change:transform}
  .mtable th:hover{color:var(--txt)}
  /* 固定第一欄（股票名稱）：只套用在一般排行榜表格，鉅額交易的rowspan合併表格
     第一格不是每列都存在，套用會讓固定欄位跟其他欄位錯位，故排除（該表格另有
     bstick1/2 專屬class，見blockTradeTable()）。分組表頭(mtable-2row)每欄兩列
     都有獨立th(見tblInner())，所以這條規則對兩列表頭一樣成立，不用特別排除。 */
  .mtable-stickycol td:first-child, .mtable-stickycol th:first-child{position:sticky;left:-12px;z-index:1;will-change:transform}
  .mtable-stickycol th:first-child{z-index:3}
  /* 分組表頭：第一列是分組名稱(跨欄)或空白佔位，第二列是個別欄名+排序箭頭。
     第二列的sticky top由fixGroupHeaderSticky()量測第一列實際高度後動態寫入
     (同樣要扣掉6px padding補償)；這裡只給預設值防止JS還沒跑之前(極短暫)不sticky。*/
  .mtable-2row th.grp{text-align:center;color:var(--accent);font-size:.72rem}
  /* 分組交界格線：跟隔壁分組拉出一條直向分隔線，避免相鄰分組的欄位混淆
     （例如「借賣」最後一欄跟「融券」第一欄看起來像同一組）。 */
  .gb{border-left:1px solid var(--line)}
  /* 兩列式表頭光靠每個th自己position:sticky不夠：實測此瀏覽器環境下thead裡有
     兩個<tr>時，光th sticky會整批跟著內容捲走、完全不會黏住，連tr本身也要
     position:sticky才正常。第二列top要等於第一列實際高度(扣padding補償)，由
     fixGroupHeaderSticky()動態量測寫入；這裡的18px只是JS還沒跑之前的預設值。 */
  .mtable-2row thead tr{position:sticky;z-index:4}
  .mtable-2row thead tr:first-child{top:-6px}
  .mtable-2row thead tr:nth-child(2){top:18px}
  /* 鉅額交易表格：前兩欄(個股/張數金額合併)固定，其餘欄位可左右捲動。手機寬度有限，
     把總張數+總金額合併成一欄兩行顯示並收窄欄寬，讓固定區佔比小一點、右側可捲動
     欄位能多露出來。固定寬度才能算出正確的累加left位移，用JS動態量測較脆弱，
     這裡改用CSS固定寬度換取可預期的sticky位移。靠左對齊+允許換行，避免內容在
     窄欄裡溢出到旁邊欄位(那樣視覺上就跟穿幫一樣了)。 */
  .mtable th.bstick1,.mtable td.bstick1,.mtable th.bstick2,.mtable td.bstick2{
    position:sticky;z-index:1;will-change:transform;text-align:left;
    white-space:normal;overflow:hidden;padding:5px 6px}
  .bstick1{left:-12px;width:64px;min-width:64px;max-width:64px}
  .bstick2{left:52px;width:72px;min-width:72px;max-width:72px}
  thead .bstick1,thead .bstick2{z-index:3}
  .mtable .nm{display:block;color:var(--muted);font-size:.72rem;line-height:1.3}
  .code{font-family:"Space Mono",Consolas,monospace;font-weight:700;color:var(--accent)}
  .up{color:#ef5b5b}.down{color:#2fbf71}.mut{color:var(--muted)}
  .clk{cursor:pointer}
  .clk:hover .code{text-decoration:underline}
  .clk.sel .code{color:#f0b45a}
  .grid2{display:flex;gap:10px;flex-wrap:wrap}
  .grid2>div{flex:1;min-width:260px}
  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:.92rem}
  footer{margin-top:32px;color:var(--muted);font-size:.78rem;text-align:center;line-height:1.7}
  footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><a class="back" href="https://shihpc.github.io/">← 回 Hub</a></div>
  <header>
    <h1>📊 盤後分析</h1>
    <div class="sub" id="pageSub"></div>
  </header>

  <div class="tabs" id="tabs"></div>
  <div class="stats" id="stats"></div>
  <div id="main"><div class="empty">載入中…</div></div>

  <footer>
    資料來源：FinMind（融資／借券／融券借券／當沖／鉅額）·
    <a href="https://github.com/shihpc/taiwan-flow-live-v2">taiwan-flow-live-v2</a>（主動ETF）｜
    <a href="https://github.com/shihpc/postmkt">postmkt</a>
  </footer>
</div>

<script>
"use strict";
const TABS = [
  ["aetf","主動ETF"],["lending","融資券借券"],["daytrade","當沖"],["block","鉅額交易"],
];
const SUBS = {
  aetf:"主動式ETF每日投組快照＋主動加減碼（資料源：taiwan-flow-live-v2，投信 16:30 揭露）。",
  lending:"借券系統(SLB)＋證商營業處所(NLB)兩平台餘額、Short Interest、融資融券、當沖、三大法人買賣超整合排行，依兩平台借券餘額排序。點個股展開完整明細。單位：張／千元／億元。",
  daytrade:"當沖成交金額排行。分點推估為估算法，非逐筆交易證據。",
  block:"當日鉅額交易逐筆列表，同股票分組並附總張數/總金額；買方/賣方券商分點為盡力比對（同股同價當日多筆時可能無法唯一判定，顯示—）。類型僅「配對交易／逐筆交易」兩種，FinMind未提供單一/組合證券的區分欄位。",
};
const V2_BASE = "https://raw.githubusercontent.com/shihpc/taiwan-flow-live-v2/main/data/aetf";
const state = { tab:"aetf", openEtf:null, openSub:null, openLend:null, lendQuery:"", aetf:null, pm:null, pmErr:null };

const esc = s => String(s==null?"":s).replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const sgn = (v,t) => `<span class="${v>0?"up":v<0?"down":"mut"}">${t}</span>`;
const num = v => v==null ? "—" : Math.round(v).toLocaleString("en-US");
const zh = v => v==null ? '<span class="mut">—</span>' : sgn(v,(v>0?"+":"")+Math.round(v).toLocaleString("en-US")+"張");
const yi = v => v==null ? '<span class="mut">—</span>' : sgn(v,(v>0?"+":"")+(v/1e8).toFixed(2)+"億");
const yiAbs = v => v==null ? "—" : (v/1e8).toFixed(2)+"億";
const nameCell = r => `<span class="code">${esc(r.c)}</span><span class="nm">${esc(r.n||"")}</span>`;
const cleanSub = s => String(s||"").replace(/^.*?·/,"");

// 通用表格：cols=[{h,f,cls?}]，包在可橫向捲動的卡片裡；每欄可點表頭排序
const TBLS = {}; let TBLID = 0;
const tblCellText = h => { const d = document.createElement("div"); d.innerHTML = h; return d.textContent.trim(); };
const tblCellVal = t => {
  if (t === "" || t === "—") return null;
  const n = parseFloat(t.replace(/,/g,"").replace(/[^0-9.\-]/g,""));
  return isNaN(n) ? t : n;
};
// 虛擬捲動：標的數超過門檻的表格(目前只有整合排行，2000+檔)不會把全部rows
// 都變成DOM——2215列×26欄≈5.7萬個<td>，光是innerHTML/layout/sticky計算就會讓
// 切換分頁明顯延遲。改成只渲染「目前捲動視窗+緩衝」範圍的列，上下各補一個
// 高度撐開的空白spacer列維持捲軸總高度跟一般全渲染視覺上一致，資料本身仍是
// 完整全部標的(排序/搜尋都吃完整o.rows，只有『同時掛在DOM上的列數』變少)。
const VIRTUAL_THRESHOLD = 200;
const VIRTUAL_BUFFER = 15;
function tbl(cols, rows){
  if (!rows || !rows.length) return `<div class="empty">無資料</div>`;
  const id = "tb" + (++TBLID);
  TBLS[id] = { cols, rows: [...rows], sort: { i: null, d: 1 },
    virtual: rows.length > VIRTUAL_THRESHOLD, rowH: 45, winStart: 0 };
  return `<div class="tblbox" data-tbl="${id}">${tblInner(id)}</div>`;
}
// cols可選帶g(分組名)：有g的欄位在表頭分兩列呈現（第一列分組跨欄、第二列個別
// 欄名+排序）。沒有g的欄位第一列留空白佔位、第二列放實際欄名+排序——刻意不用
// rowspan貫穿兩列：實測rowspan儲存格配position:sticky在部分瀏覽器捲動時會跑位
// (sticky高度算圖跟rowspan的跨列邏輯衝突)，每欄兩列都給獨立th，sticky行為
// 才跟原本單列表頭完全一致，只是第一列(分組列)裡沒有分組的欄位長空的。
const tblBoundary = (cols, i) => cols.some(c=>c.g) && i > 0 && cols[i].g !== cols[i-1].g;
const tblCellCls = (cols, c, i) => (c.cls||"") + (tblBoundary(cols,i) ? " gb" : "");
const tblRowHtml = (cols, r) => `<tr>`+cols.map((c,i)=>`<td class="${tblCellCls(cols,c,i)}">${c.f(r)}</td>`).join("")+`</tr>`;
function tblBodyHtml(id){
  const o = TBLS[id];
  if (!o.virtual) return o.rows.map(r=>tblRowHtml(o.cols,r)).join("");
  const wrap = document.querySelector(`[data-tbl="${id}"]`);
  const viewH = wrap ? wrap.clientHeight : 495;
  const scrollTop = wrap ? wrap.scrollTop : 0;
  const start = Math.max(0, Math.floor(scrollTop / o.rowH) - VIRTUAL_BUFFER);
  const count = Math.ceil(viewH / o.rowH) + VIRTUAL_BUFFER * 2;
  const end = Math.min(o.rows.length, start + count);
  o.winStart = start;
  const spacer = h => `<tr class="vsp"><td colspan="${o.cols.length}" style="height:${h}px;padding:0;border:0;box-shadow:none"></td></tr>`;
  let html = spacer(start * o.rowH);
  for (let i = start; i < end; i++) html += tblRowHtml(o.cols, o.rows[i]);
  html += spacer((o.rows.length - end) * o.rowH);
  return html;
}
function tblInner(id){
  const { cols, rows, sort } = TBLS[id];
  const hasGroups = cols.some(c => c.g);
  // 分組交界(含「有分組→無分組」「無分組→有分組」「不同分組相鄰」)畫一條直向格線，
  // 避免相鄰分組的欄位混在一起分不清楚。i===0不算交界(表格最左緣不用畫線)。
  const clsOf = (c,i) => tblCellCls(cols,c,i);
  let head;
  if (!hasGroups){
    head = `<tr>` + cols.map((c,i) => `<th class="${clsOf(c,i)}" data-i="${i}">${c.h}${sort.i===i?(sort.d>0?" ▲":" ▼"):""}</th>`).join("") + `</tr>`;
  } else {
    let row1 = "", row2 = "";
    for (let i = 0; i < cols.length; i++){
      const c = cols[i];
      if (!c.g){
        row1 += `<th class="${clsOf(c,i)}"></th>`;
      } else if (i === 0 || cols[i-1].g !== c.g){
        let j = i; while (j < cols.length && cols[j].g === c.g) j++;
        row1 += `<th class="grp${tblBoundary(cols,i)?" gb":""}" colspan="${j-i}">${c.g}</th>`;
      }
      row2 += `<th class="${clsOf(c,i)}" data-i="${i}">${c.h}${sort.i===i?(sort.d>0?" ▲":" ▼"):""}</th>`;
    }
    head = `<tr>${row1}</tr><tr>${row2}</tr>`;
  }
  const body = tblBodyHtml(id);
  const table = `<table class="mtable mtable-stickycol${hasGroups?" mtable-2row":""}"><thead>${head}</thead><tbody>${body}</tbody></table>`;
  // 用setTimeout而非requestAnimationFrame觸發量測：rAF在部分無頭/背景分頁環境
  // 完全不會執行，這兩個量測都需要保證真的跑到，setTimeout(fn,0)沒有這個問題。
  if (hasGroups) setTimeout(() => fixGroupHeaderSticky(id), 0);
  if (TBLS[id].virtual) setTimeout(() => initVirtualScroll(id), 0);
  return table;
}
// 分組表頭第二列的sticky top要等於第一列實際渲染高度，不同瀏覽器/字型算出來的
// 高度會有微差，用JS量測後動態寫inline style最穩，寫死px容易跟實際高度對不齊
// 導致第二列表頭捲動時被第一列蓋住一小條或露出縫隙。
function fixGroupHeaderSticky(id){
  const wrap = document.querySelector(`[data-tbl="${id}"]`);
  if (!wrap) return;
  const tr1 = wrap.querySelector("thead tr:first-child");
  const tr2 = wrap.querySelector("thead tr:nth-child(2)");
  if (!tr1 || !tr2) return;
  const h = Math.ceil(tr1.getBoundingClientRect().height);
  tr2.style.top = (h - 6) + "px"; // 扣.tblbox的6px padding-top補償，理由見上方CSS註解
}
// 首次渲染用45px猜測列高算spacer，實際列高依內容(如nameCell兩行堆疊)會有出入，
// 量到真實高度後如果差距明顯(>2px)就用正確高度重新算一次視窗，避免捲軸總高度
// 跟畫面實際列數對不上(捲到底前就沒列可捲，或捲到底還有大片空白)。
function initVirtualScroll(id){
  const wrap = document.querySelector(`[data-tbl="${id}"]`);
  if (!wrap) return;
  const o = TBLS[id];
  const firstRow = wrap.querySelector("tbody tr:not(.vsp)");
  if (firstRow){
    const h = firstRow.getBoundingClientRect().height;
    if (h && Math.abs(h - o.rowH) > 2){
      o.rowH = h;
      wrap.querySelector("tbody").innerHTML = tblBodyHtml(id);
    }
  }
}
// 直接同步更新，不透過requestAnimationFrame：實測rAF在部分無頭/背景分頁環境
// 完全不會觸發(callback永遠不執行)，捲動視窗就卡死在初始位置。這裡的重算成本
// 本來就很低(只算一個視窗範圍+重繪~40列)，同步做也不會卡頓，不需要rAF節流。
function tblVirtualSync(box){
  const id = box.dataset.tbl;
  const o = TBLS[id];
  if (!o || !o.virtual) return;
  const startBefore = o.winStart;
  const html = tblBodyHtml(id);
  if (o.winStart !== startBefore) box.querySelector("tbody").innerHTML = html;
}
document.addEventListener("scroll", e => {
  const box = e.target;
  if (!box.classList || !box.classList.contains("tblbox")) return;
  tblVirtualSync(box);
}, true);
// 保險：scroll事件理論上該即時觸發，但實測某些情境(分頁不在前景/隱藏文件)

  const col = o.cols[i], d = o.sort.d;
  const val = r => tblCellVal(tblCellText(col.f(r)));
  o.rows.sort((a,b) => {

    return typeof x==="number" && typeof y==="number" ? (x-y)*d : String(x).localeCompare(String(y),"zh-Hant")*d;
  });

});

// 鉅額交易逐筆：個股/總張數/總金額 依股票分組合併(rowspan)，其餘欄位逐筆呈現
// （資料已依股票分組，同股票的列必連續，逐筆表頭不做點擊排序——排序會打散分組；
// 但合併後的「張數/金額」欄可依總金額排序整個分組順序，見BLOCK_SORT_DIR）。
let BLOCK_SORT_DIR = -1; // -1=金額大→小(預設，同build時的順序)，1=小→大
function sortBlockGroups(rows, dir){
  const by = new Map();
  for (const r of rows){ if (!by.has(r.c)) by.set(r.c, []); by.get(r.c).push(r); }
  return [...by.values()].sort((a,b) => dir*(a[0].stock_money - b[0].stock_money)).flat();
}
document.addEventListener("click", e => {
  const bh = e.target.closest("[data-blocksort]");
  if (!bh || !state.pm || !state.pm.blocktrade) return;
  BLOCK_SORT_DIR *= -1;
  state.pm.blocktrade.rows = sortBlockGroups(state.pm.blocktrade.rows, BLOCK_SORT_DIR);
  renderPM();
});
function blockTradeTable(rows){
  if (!rows || !rows.length) return `<div class="empty">無資料</div>`;
  const traderCell = r => {
    const buy = r.buy_trader ? esc(r.buy_trader) : '<span class="mut">—</span>';
    const sell = r.sell_trader ? esc(r.sell_trader) : '<span class="mut">—</span>';
    return `買：${buy}<span class="nm">賣：${sell}</span>`;
  };
  const head = `<th class="l bstick1">個股</th>`
    + `<th class="l bstick2" data-blocksort>張數/金額${BLOCK_SORT_DIR<0?" ▼":" ▲"}</th>`
    + `<th>類型</th><th>價格</th><th>張數</th><th>金額</th><th class="l">券商分點</th>`;
  let body = "";
  for (let i = 0; i < rows.length; i++){
    const r = rows[i];
    const isFirst = i === 0 || rows[i-1].c !== r.c;
    let span = 0;
    if (isFirst){ let j = i; while (j < rows.length && rows[j].c === r.c) j++; span = j - i; }
    body += `<tr>`
      + (isFirst ? `<td class="l bstick1" rowspan="${span}">${nameCell(r)}</td>`
        + `<td class="l bstick2" rowspan="${span}"><div>${num((r.stock_vol||0)/1000)}張</div><div class="nm">${yiAbs(r.stock_money)}</div></td>` : "")
      + `<td>${esc(r.type)}</td>`
      + `<td>${r.price==null?"—":r.price.toLocaleString("en-US")}</td>`
      + `<td>${num(r.vol/1000)}</td>`
      + `<td>${yiAbs(r.money)}</td>`
      + `<td class="l">${traderCell(r)}</td>`
      + `</tr>`;
  }
  return `<div class="tblbox"><table class="mtable"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>`;
}

function aetfAdvice(diff){
  const L = [];
  const st = diff.stocks||[], sb = diff.subs||[];
  const co = st.filter(s=>Object.values(s.by||{}).filter(v=>v>0).length>=2).slice(0,3);
  if (co.length) L.push(`<b class="up">多檔同買</b>：${co.map(s=>esc(s.n||s.c)).join("、")}`);
  const cs = st.filter(s=>Object.values(s.by||{}).filter(v=>v<0).length>=2).slice(0,2);
  if (cs.length) L.push(`<b class="down">多檔同賣</b>：${cs.map(s=>esc(s.n||s.c)).join("、")}`);
  const inn = sb.filter(s=>s.val>0)[0], out = sb.filter(s=>s.val<0)[0];
  if (inn) L.push(`次產業最大加碼：<span class="up">${esc(cleanSub(inn.name))} +${(inn.val/1e8).toFixed(1)}億</span>`);
  if (out) L.push(`最大減碼：<span class="down">${esc(cleanSub(out.name))} ${(out.val/1e8).toFixed(1)}億</span>`);
  for (const [k,v] of Object.entries(diff.etfs||{})){
    if (v.est_flow && Math.abs(v.est_flow) >= 10e8)
      L.push(`${esc(k)} 淨${v.est_flow>0?"申購":"贖回"}約 ${(Math.abs(v.est_flow)/1e8).toFixed(0)}億`);
  }
  return L;
}

    ], allRows);
    html += `<div class="mut" style="font-size:.74rem;margin:2px 4px 8px">資料源：兩平台借券餘額(TWSE公開端點，非官方保證SLA)、`
      + `融資融券/借券賣出餘額/當沖/三大法人買賣超/外資持股(FinMind)。市值異動為「張數異動×今日收盤價」估算，`
      + `非逐日歷史價回推的精確市值差。個股融資融券維持率、投信/自營商持股水位、`
      + `借券還券完成日期明細為官方未公開資料，查無來源，不提供估計值。</div>`;
  } else if (state.tab === "daytrade"){
    const t = d.daytrading || {};
    const traderLine = x => `${esc(x.trader)} ${num(x.vol)}張${x.money==null?"":`(${yiAbs(x.money*1000)})`}`;
    const tradersCell = r => {
      const ts = r.traders || [];
      if (!ts.length) return '<span class="mut">—</span>';
      const [first, ...rest] = ts;
      return traderLine(first) + rest.map(x => `<span class="nm">${traderLine(x)}</span>`).join("");
    };
    const cols = [
      {h:"個股",cls:"l",f:nameCell},
      {h:"當沖量(張)",f:r=>num(r.vol/1000)},
      {h:"當沖金額",f:r=>yiAbs(r.amt)},
      {h:"比重",f:r=>r.ratio==null?'<span class="mut">—</span>':r.ratio.toFixed(1)+"%"},
      {h:"漲跌幅(%)",f:r=>r.chg_pct==null?'<span class="mut">—</span>':sgn(r.chg_pct,(r.chg_pct>0?"+":"")+r.chg_pct.toFixed(2))},
      {h:"振幅(%)",f:r=>r.amp_pct==null?'<span class="mut">—</span>':r.amp_pct.toFixed(2)},
      {h:"分點推估",cls:"l",f:tradersCell}];
    html += sec("當沖排行", esc(t.date||"")) + tbl(cols, t.by_amount||[]);
    html += `<div class="mut" style="font-size:.74rem;margin:2px 4px 8px">分點推估：同分點當日買量／賣量取較小值視為「有能力形成當沖」的量，`
      + `為分析常見估算法，非逐筆交易的直接證據，僅供參考。</div>`;
  } else if (state.tab === "block"){
    const b = d.blocktrade || {};
    html += sec("鉅額交易逐筆", `${esc(b.date||"")} · 共 ${(b.rows||[]).length} 筆 · 同股票分組、組間依總金額排序`);
    html += blockTradeTable(b.rows||[]);
  }
  main.innerHTML = html || `<div class="empty">無資料</div>`;
}

// ---------- 共用 ----------
function renderStats(){
  const el = document.getElementById("stats");
  if (state.tab === "aetf"){
    const l = state.aetf && state.aetf.latest;
    el.innerHTML = l ? `<div class="stat"><b>${Object.keys(l.etfs||{}).length}</b>檔 ETF</div>`
      + `<div class="stat">快照 ${esc(l.run_date||"—")}</div>` : "";
  } else {
    const d = state.pm;
    el.innerHTML = d ? `<div class="stat">資料日 <b>${esc(d.date||"—")}</b></div>`
      + `<div class="stat">更新 ${esc(String(d.generated_at||"").slice(0,16).replace("T"," "))} UTC</div>` : "";
  }
}
function render(){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.tab===state.tab));
  document.getElementById("pageSub").textContent = SUBS[state.tab] || "";
  renderStats();
  if (state.tab === "aetf") renderAETF(); else renderPM();
}
function renderTabs(){
  document.getElementById("tabs").innerHTML = TABS.map(([k,label])=>
    `<div class="tab ${state.tab===k?"active":""}" data-tab="${k}">${label}</div>`).join("");
  document.querySelectorAll(".tab").forEach(t=>t.onclick = ()=>{ state.tab = t.dataset.tab; render(); });
}
document.addEventListener("click", e=>{
  const el1 = e.target.closest(".clk[data-etf]");
  if (el1){ state.openEtf = state.openEtf===el1.dataset.etf ? null : el1.dataset.etf; render();
    if (state.openEtf){ const x=document.getElementById("etfdd"); if(x)x.scrollIntoView({behavior:"smooth",block:"start"}); } return; }
  const el2 = e.target.closest(".clk[data-asub]");
  if (el2){ const v = decodeURIComponent(el2.dataset.asub);
    state.openSub = state.openSub===v ? null : v; render();
    if (state.openSub){ const x=document.getElementById("subdd"); if(x)x.scrollIntoView({behavior:"smooth",block:"start"}); } return; }
  const el3 = e.target.closest(".clk[data-lend]");
  if (el3){ state.openLend = state.openLend===el3.dataset.lend ? null : el3.dataset.lend; render();
    if (state.openLend){ const x=document.getElementById("lenddd"); if(x)x.scrollIntoView({behavior:"smooth",block:"start"}); } }
});

async function loadJSON(url){
  const r = await fetch(url);
  if (!r.ok) throw new Error("HTTP "+r.status);
  return r.json();
}
async function load(){
  renderTabs(); render();
  const t = Date.now();
  const pAetf = (async ()=>{
    const o = {latest:null, diff:null};
    try{ o.latest = await loadJSON(V2_BASE+"/latest.json?t="+t); }catch(e){}
    try{ o.diff = await loadJSON(V2_BASE+"/diff.json?t="+t); }catch(e){}
    state.aetf = o;
  })();
  const pPm = (async ()=>{
    try{ state.pm = await loadJSON("data/postmkt.json?t="+t); }
    catch(e){ state.pmErr = e; }
  })();
  pAetf.then(render); pPm.then(render);
  await Promise.all([pAetf, pPm]);
  render();
}
load();
</script>
